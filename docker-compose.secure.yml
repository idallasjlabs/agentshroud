version: '3.8'

# One Claw Tied Behind Your Back - Secure Docker Compose Configuration
# All builds happen in containers - no source code on host

services:
  openclaw:
    # Build from secure Dockerfile (clones and builds inside container)
    build:
      context: .
      dockerfile: Dockerfile.secure
      args:
        OPENCLAW_VERSION: main  # Change to specific tag for production (e.g., v2026.2.14)

    image: oneclaw-secure:latest
    container_name: oneclaw_gateway
    hostname: openclaw

    # Network isolation
    networks:
      - openclaw_net

    # Port exposure (localhost only for security)
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    read_only: true
    user: "1000:1000"

    # Temporary directories (required for read-only root)
    tmpfs:
      - /tmp
      - /var/tmp
      - /app/.cache

    # Environment variables
    environment:
      - NODE_ENV=production
      - HOME=/app
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BLUEBUBBLES_PASSWORD=${BLUEBUBBLES_PASSWORD}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}

    # Volumes (selective write access)
    volumes:
      - workspace:/app/workspace
      - config:/app/.oneclaw:ro
      - logs:/app/workspace/logs

    # Resource limits
    mem_limit: 4g
    mem_reservation: 2g
    cpus: 2

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  openclaw_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
          gateway: 172.25.0.1
    driver_opts:
      com.docker.network.bridge.name: openclaw_br
      com.docker.network.bridge.enable_icc: "false"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENCLAW_WORKSPACE_DIR:-./workspace}

  config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENCLAW_CONFIG_DIR:-./config}

  logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENCLAW_LOGS_DIR:-./logs}
