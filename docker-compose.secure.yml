# AgentShroud Proxy Mode — Full Network Isolation + Egress Control
#
# Two networks:
# - "external" — only AgentShroud gateway exposed to host
# - "internal" — OpenClaw container, NOT exposed to host
#
# AgentShroud gateway bridges both networks.
# OpenClaw joins ONLY the internal network.
#
# Egress controls (Phase 11):
# - DNS: OpenClaw uses gateway as DNS resolver (dns_filter)
# - Files: Only sandboxed paths mounted into OpenClaw
# - Keys: NO API keys in OpenClaw container env — gateway injects them
# - All egress monitored and audited
#
# Usage:
#   docker compose -f docker-compose.secure.yml up -d
#
# Verify:
#   ./scripts/verify-proxy.sh

services:
  agentshroud-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: agentshroud-gateway
    ports:
      - "8080:8080"
      - "5353:53/udp"    # DNS filter endpoint
      - "5353:53/tcp"
    networks:
      - external
      - internal
    environment:
      - AGENTSHROUD_MODE=proxy
      - OPENCLAW_INTERNAL_URL=http://openclaw:3000
      - AGENTSHROUD_CONFIG=/app/agentshroud.yaml
      - AGENTSHROUD_EGRESS_CONFIG=/app/egress-config.yml
      # API keys live HERE, never in OpenClaw container
      # Load from 1Password or host env at deploy time
      # - OPENAI_API_KEY=<injected at runtime>
      # - GITHUB_TOKEN=<injected at runtime>
    volumes:
      - ./agentshroud.yaml:/app/agentshroud.yaml:ro
      - ./examples/egress-config.yml:/app/egress-config.yml:ro
      - gateway-data:/app/data
      - security-reports:/var/log/security
      - falco-alerts:/var/log/falco:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(http://localhost:8080/health)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  openclaw:
    image: openclaw:latest
    container_name: openclaw
    # NO port mapping — only accessible via internal network
    networks:
      - internal
    # DNS: all queries go through gateway DNS filter
    dns:
      - agentshroud-gateway
    environment:
      - OPENCLAW_BIND=0.0.0.0
      - OPENCLAW_PORT=3000
      # NO API keys here — gateway injects auth on proxied requests
      # Proxy all HTTP through gateway
      - HTTP_PROXY=http://agentshroud-gateway:8080
      - HTTPS_PROXY=http://agentshroud-gateway:8080
    volumes:
      # Only mount sandboxed workspace — no host root, no secrets
      - openclaw-workspace:/workspace
      # Temp dir for scratch files (cleaned periodically)
      - openclaw-tmp:/tmp/openclaw
      # NO access to: /etc, ~/.ssh, ~/.aws, ~/.gnupg, host env
    read_only: false
    tmpfs:
      - /tmp:size=256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  falco:
    image: falcosecurity/falco:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /dev:/host/dev:ro
      - /proc:/host/proc:ro
      - ./docker/falco/falco.yaml:/etc/falco/falco.yaml:ro
      - ./docker/falco/rules.yaml:/etc/falco/rules.d/agentshroud.yaml:ro
      - falco-alerts:/var/log/falco
    networks:
      - internal
    restart: unless-stopped

  wazuh:
    image: wazuh/wazuh-agent:latest
    volumes:
      - openclaw-workspace:/host/workspace:ro
      - ./docker/wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - security-reports:/host/security-reports:ro
    networks:
      - internal
    restart: unless-stopped

networks:
  external:
    driver: bridge
    name: agentshroud-external
  internal:
    driver: bridge
    internal: true  # No external access — isolated
    name: agentshroud-internal

volumes:
  gateway-data:
  security-reports:
  falco-alerts:
  clamav-db:
  openclaw-workspace:
  openclaw-tmp:

  # === MCP Servers (Phase 9) ===
  # MCP servers run on the internal network ONLY.
  # All MCP traffic is routed through the AgentShroud gateway proxy.
  # Add your MCP servers here. Example:
  #
  # mcp-homeassistant:
  #   image: your-mcp-server:latest
  #   networks:
  #     - internal    # Internal only — no direct external access
  #   environment:
  #     - HA_URL=http://homeassistant.local:8123
  #   restart: unless-stopped
  #
  # mcp-filesystem:
  #   image: mcp-filesystem:latest
  #   networks:
  #     - internal
  #   volumes:
  #     - openclaw-workspace:/workspace:ro
  #   restart: unless-stopped
  #
  # IMPORTANT: MCP servers must ONLY be on the "internal" network.
  # The agentshroud-gateway bridges internal↔external and applies
  # security inspection to all MCP tool calls via the MCP Proxy Layer.
