# SecureClaw Proxy Mode — Full Network Isolation
#
# Two networks:
# - "external" — only SecureClaw gateway exposed to host
# - "internal" — OpenClaw container, NOT exposed to host
#
# SecureClaw gateway bridges both networks.
# OpenClaw joins ONLY the internal network.
#
# All traffic MUST flow through the security pipeline.
#
# Usage:
#   docker compose -f docker-compose.secure.yml up -d
#
# Verify:
#   ./scripts/verify-proxy.sh

services:
  secureclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: secureclaw-gateway
    ports:
      - "8080:8080"
    networks:
      - external
      - internal
    environment:
      - SECURECLAW_MODE=proxy
      - OPENCLAW_INTERNAL_URL=http://openclaw:3000
      - SECURECLAW_CONFIG=/app/secureclaw.yaml
    volumes:
      - ./secureclaw.yaml:/app/secureclaw.yaml:ro
      - gateway-data:/app/data
      - security-reports:/var/log/security
      - falco-alerts:/var/log/falco:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  openclaw:
    image: openclaw:latest
    container_name: openclaw
    # NO port mapping — only accessible via internal network
    networks:
      - internal
    environment:
      - OPENCLAW_BIND=0.0.0.0
      - OPENCLAW_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  falco:
    image: falcosecurity/falco:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /dev:/host/dev:ro
      - /proc:/host/proc:ro
      - ./docker/falco/falco.yaml:/etc/falco/falco.yaml:ro
      - ./docker/falco/rules.yaml:/etc/falco/rules.d/secureclaw.yaml:ro
      - falco-alerts:/var/log/falco
    networks:
      - internal
    restart: unless-stopped

  wazuh:
    image: wazuh/wazuh-agent:latest
    volumes:
      - openclaw-workspace:/host/workspace:ro
      - ./docker/wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - security-reports:/host/security-reports:ro
    networks:
      - internal
    restart: unless-stopped

networks:
  external:
    driver: bridge
    name: secureclaw-external
  internal:
    driver: bridge
    internal: true  # No external access — isolated
    name: secureclaw-internal

volumes:
  gateway-data:
  security-reports:
  falco-alerts:
  clamav-db:
  openclaw-workspace:

  # === MCP Servers (Phase 9) ===
  # MCP servers run on the internal network ONLY.
  # All MCP traffic is routed through the SecureClaw gateway proxy.
  # Add your MCP servers here. They must ONLY be on the "internal" network.
  # The secureclaw-gateway bridges internal<->external and applies
  # security inspection to all MCP tool calls via the MCP Proxy Layer.
  #
  # Example:
  # mcp-homeassistant:
  #   image: your-mcp-server:latest
  #   networks:
  #     - internal
  #   restart: unless-stopped
