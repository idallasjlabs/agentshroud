<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentShroud™ · Secure Chat</title>
    <style>
        :root {
            --bg:        #08090b;
            --surface:   #0f1219;
            --surface-2: #161c27;
            --border:    #232b3d;
            --brand:     #1583f0;
            --brand-dim: rgba(21,131,240,0.10);
            --text:      #e2e8f0;
            --text-2:    #94a3b8;
            --text-3:    #546280;
            --green:     #22c55e;
            --red:       #ef4444;
            --red-dim:   rgba(239,68,68,0.15);
            --radius:    10px;
            --sans: -apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Helvetica,Arial,sans-serif;
            --mono: 'SF Mono','Cascadia Code','Consolas',monospace;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: inset 0 2px 0 0 var(--brand);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .header-wordmark {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
        }
        .header-wordmark span { color: var(--brand); }

        .header-divider {
            width: 1px; height: 18px;
            background: var(--border);
        }

        .header-agent {
            font-size: 12px;
            color: var(--text-2);
            font-weight: 500;
        }

        #status {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-3);
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            font-family: var(--mono);
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Message List ────────────────────────────────────────── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg);
        }

        #messages::-webkit-scrollbar { width: 5px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: msg-in 0.2s ease;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: none; }
        }

        .message.user  { align-self: flex-end; align-items: flex-end; }
        .message.assistant { align-self: flex-start; align-items: flex-start; }

        .message-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-3);
            padding: 0 4px;
        }
        .message.user .message-label { color: rgba(21,131,240,0.7); }

        .message-bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message.user .message-bubble {
            background: var(--brand);
            color: #fff;
            border-bottom-right-radius: 3px;
            box-shadow: 0 2px 12px rgba(21,131,240,0.30);
        }

        .message.assistant .message-bubble {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 3px;
        }

        .metadata {
            font-size: 10px;
            color: var(--text-3);
            font-family: var(--mono);
            padding: 0 4px;
        }

        /* ── Loading indicator ───────────────────────────────────── */
        .loading {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 3px;
            font-size: 12px;
            color: var(--text-3);
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--brand);
            animation: dot-bounce 1.2s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
            40%          { transform: scale(1.0); opacity: 1.0; }
        }

        /* ── Error ───────────────────────────────────────────────── */
        .error {
            align-self: stretch;
            background: var(--red-dim);
            border: 1px solid rgba(239,68,68,0.30);
            color: var(--red);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 12px;
        }

        /* ── Input Area ──────────────────────────────────────────── */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 14px 20px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 13px;
            font-family: var(--sans);
            resize: none;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            min-height: 42px;
            max-height: 120px;
        }
        #messageInput::placeholder { color: var(--text-3); }
        #messageInput:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(21,131,240,0.15);
        }
        #messageInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #sendButton {
            padding: 10px 20px;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--sans);
            transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(21,131,240,0.25);
        }
        #sendButton:hover:not(:disabled) {
            background: #0f6fd4;
            box-shadow: 0 3px 12px rgba(21,131,240,0.40);
        }
        #sendButton:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .input-footer {
            margin-top: 8px;
            font-size: 10px;
            color: var(--text-3);
            display: flex;
            justify-content: space-between;
        }

        /* ── Security badge ──────────────────────────────────────── */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.3px;
        }
        .security-badge::before {
            content: '●';
            font-size: 6px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-brand">
            <!-- AgentShroud Shield Icon -->
            <svg width="22" height="26" viewBox="0 0 26 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M13 0L0 5v9C0 21.7 5.7 27.8 13 30 20.3 27.8 26 21.7 26 14V5L13 0z"
                      fill="#1583f0" opacity="0.18"/>
                <path d="M13 0L0 5v9C0 21.7 5.7 27.8 13 30 20.3 27.8 26 21.7 26 14V5L13 0z"
                      stroke="#1583f0" stroke-width="1.5" fill="none"/>
                <circle cx="13" cy="15" r="5.5" fill="#1583f0"/>
                <circle cx="13" cy="15" r="2.8" fill="#08090b"/>
                <circle cx="13" cy="15" r="1.4" fill="#1583f0"/>
            </svg>
            <span class="header-wordmark">AgentShroud<span>™</span></span>
        </div>
        <div class="header-divider"></div>
        <span class="header-agent">Secure Chat · PII Protected</span>
        <div id="status">Initializing…</div>
    </header>

    <div id="messages"></div>

    <div class="input-area">
        <div class="input-row">
            <input
                type="text"
                id="messageInput"
                placeholder="Send a message through the AgentShroud gateway…"
                disabled
            />
            <button id="sendButton" disabled>Send</button>
        </div>
        <div class="input-footer">
            <span class="security-badge">PII Sanitized · Audit Logged · Policy Enforced</span>
            <span>AgentShroud™ Gateway · © 2026 Isaiah Dallas Jefferson, Jr.</span>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');

        let authToken = null;

        // Initialize - get auth token from URL or prompt
        async function initialize() {
            // Try to get token from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            authToken = urlParams.get('token');

            if (!authToken) {
                authToken = prompt('Enter your AgentShroud auth token:\n\n(Find it in gateway logs or agentshroud.yaml)');
                if (authToken) {
                    // Trim whitespace from token
                    authToken = authToken.trim();
                    // Update URL with token for refresh
                    window.history.replaceState({}, '', `?token=${authToken}`);
                }
            } else {
                // Trim whitespace from URL token too
                authToken = authToken.trim();
            }

            if (!authToken) {
                showError('No auth token provided. Cannot connect.');
                return;
            }

            // Test connection
            try {
                const response = await fetch('/status');
                const data = await response.json();
                statusDiv.textContent = `Connected · ${data.status} · PII: ${data.pii_engine}`;
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            } catch (err) {
                showError('Failed to connect to AgentShroud Gateway');
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            messagesDiv.appendChild(errorDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addMessage(content, role, metadata = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'AgentShroud';
            wrapper.appendChild(label);

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            wrapper.appendChild(bubble);

            if (metadata) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'metadata';
                metaDiv.textContent = metadata;
                wrapper.appendChild(metaDiv);
            }

            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // Disable input while processing
            messageInput.disabled = true;
            sendButton.disabled = true;

            // Show user message
            addMessage(content, 'user');
            messageInput.value = '';

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>Processing through gateway…';
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch('/forward', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        content: content,
                        source: 'browser_extension',
                        content_type: 'text'
                    })
                });

                loadingDiv.remove();

                if (!response.ok) {
                    const error = await response.json();
                    showError(`Error: ${error.detail || 'Unknown error'}`);
                } else {
                    const data = await response.json();

                    if (data.agent_response) {
                        const metadata = `${data.agent_response.model} · ${data.agent_response.tokens_used} tokens`;
                        addMessage(data.agent_response.response, 'assistant', metadata);
                    } else {
                        showError('No response from agent (agent may be offline)');
                    }
                }
            } catch (err) {
                loadingDiv.remove();
                showError(`Network error: ${err.message}`);
            } finally {
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize on load
        initialize();
    </script>
</body>
</html>
