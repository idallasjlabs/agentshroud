<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentShroud Chat - therealidallasj</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #2d2d2d;
            padding: 1rem 2rem;
            border-bottom: 2px solid #00ff88;
        }

        h1 {
            font-size: 1.5rem;
            color: #00ff88;
        }

        .status {
            font-size: 0.875rem;
            color: #888;
            margin-top: 0.25rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 1rem;
            border-radius: 8px;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background: #0066cc;
            color: white;
        }

        .assistant {
            align-self: flex-start;
            background: #2d2d2d;
            border: 1px solid #444;
        }

        .metadata {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.5rem;
        }

        .input-area {
            background: #2d2d2d;
            padding: 1rem 2rem;
            border-top: 1px solid #444;
        }

        .input-container {
            display: flex;
            gap: 1rem;
        }

        #messageInput {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 1rem;
        }

        #messageInput:focus {
            outline: none;
            border-color: #00ff88;
        }

        button {
            padding: 0.75rem 2rem;
            background: #00ff88;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #00cc6e;
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .error {
            background: #cc0000;
            color: white;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 2rem;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>AgentShroud Chat</h1>
        <div class="status" id="status">Connecting...</div>
    </header>

    <div id="messages"></div>

    <div class="input-area">
        <div class="input-container">
            <input
                type="text"
                id="messageInput"
                placeholder="Type your message to therealidallasj..."
                disabled
            />
            <button id="sendButton" disabled>Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');

        let authToken = null;

        // Initialize - get auth token from URL or prompt
        async function initialize() {
            // Try to get token from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            authToken = urlParams.get('token');

            if (!authToken) {
                authToken = prompt('Enter your AgentShroud auth token:\n\n(Find it in gateway logs or secureclaw.yaml)');
                if (authToken) {
                    // Trim whitespace from token
                    authToken = authToken.trim();
                    // Update URL with token for refresh
                    window.history.replaceState({}, '', `?token=${authToken}`);
                }
            } else {
                // Trim whitespace from URL token too
                authToken = authToken.trim();
            }

            if (!authToken) {
                showError('No auth token provided. Cannot connect.');
                return;
            }

            // Test connection
            try {
                const response = await fetch('/status');
                const data = await response.json();
                statusDiv.textContent = `Connected - ${data.status} - PII: ${data.pii_engine}`;
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            } catch (err) {
                showError('Failed to connect to AgentShroud Gateway');
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            messagesDiv.appendChild(errorDiv);
        }

        function addMessage(content, role, metadata = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const textDiv = document.createElement('div');
            textDiv.textContent = content;
            msgDiv.appendChild(textDiv);

            if (metadata) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'metadata';
                metaDiv.textContent = metadata;
                msgDiv.appendChild(metaDiv);
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // Disable input while processing
            messageInput.disabled = true;
            sendButton.disabled = true;

            // Show user message
            addMessage(content, 'user');
            messageInput.value = '';

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = 'therealidallasj is thinking...';
            messagesDiv.appendChild(loadingDiv);

            try {
                const response = await fetch('/forward', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        content: content,
                        source: 'browser_extension',
                        content_type: 'text'
                    })
                });

                loadingDiv.remove();

                if (!response.ok) {
                    const error = await response.json();
                    showError(`Error: ${error.detail || 'Unknown error'}`);
                } else {
                    const data = await response.json();

                    if (data.agent_response) {
                        const metadata = `${data.agent_response.model} • ${data.agent_response.tokens_used} tokens`;
                        addMessage(data.agent_response.response, 'assistant', metadata);
                    } else {
                        showError('No response from agent (agent may be offline)');
                    }
                }
            } catch (err) {
                loadingDiv.remove();
                showError(`Network error: ${err.message}`);
            } finally {
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize on load
        initialize();
    </script>
</body>
</html>
