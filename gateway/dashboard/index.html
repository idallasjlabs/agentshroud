<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureClaw Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600;color:var(--accent)}
.header .logo{font-size:24px}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.status-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.disconnected{background:var(--red);box-shadow:0 0 6px var(--red)}
.uptime{color:var(--text-dim);font-size:12px;margin-left:auto}
.grid{display:grid;grid-template-columns:1fr 320px;gap:16px;padding:16px;max-width:1400px;margin:0 auto}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.card h2{font-size:14px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--bg);border-radius:6px;padding:12px;text-align:center}
.stat .value{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--text-dim);text-transform:uppercase}
.feed{max-height:500px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.event{padding:8px 12px;border-radius:4px;background:var(--bg);display:flex;gap:8px;align-items:flex-start;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.event .time{color:var(--text-dim);font-size:11px;white-space:nowrap;min-width:60px}
.badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.badge.forward{background:#1f3a5f;color:var(--accent)}
.badge.ssh_exec{background:#1a3a1a;color:var(--green)}
.badge.ssh_denied{background:#3d1a1a;color:var(--red)}
.badge.approval_submitted{background:#3d2f0a;color:var(--yellow)}
.badge.approval_decided{background:#2a1a3d;color:var(--purple)}
.badge.auth_failed{background:#3d1a1a;color:var(--red)}
.badge.pii_detected{background:#3d2f0a;color:var(--yellow)}
.severity-warning{border-left:3px solid var(--yellow)}
.severity-critical{border-left:3px solid var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{background:var(--bg)}50%{background:#2d1015}}
.event .summary{flex:1;word-break:break-word}
.approval-item{background:var(--bg);border-radius:6px;padding:12px;margin-bottom:8px}
.approval-item .desc{margin-bottom:8px}
.approval-item .actions{display:flex;gap:8px}
.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.btn-approve{background:var(--green);color:#000}
.btn-reject{background:var(--red);color:#fff}
.btn:hover{opacity:0.85}
.ssh-item{background:var(--bg);border-radius:4px;padding:8px 12px;margin-bottom:4px;font-family:monospace;font-size:12px}
.ssh-item .host{color:var(--accent)}
.ssh-item .cmd{color:var(--text)}
.ssh-item .status-ok{color:var(--green)}
.ssh-item .status-fail{color:var(--red)}
.empty{color:var(--text-dim);text-align:center;padding:20px;font-style:italic}
</style>
</head>
<body>
<div class="header">
  <span class="logo">🛡️</span>
  <h1>SecureClaw</h1>
  <span class="status-dot disconnected" id="statusDot"></span>
  <span id="statusText" style="color:var(--text-dim);font-size:12px">Connecting...</span>
  <span class="uptime" id="uptime"></span>
</div>
<div class="grid">
  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="card">
      <h2>Activity Feed</h2>
      <div class="feed" id="feed"><div class="empty">Waiting for events...</div></div>
    </div>
    <div class="card">
      <h2>Recent SSH Commands</h2>
      <div id="sshList"><div class="empty">No SSH commands yet</div></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="card">
      <h2>Stats</h2>
      <div class="stats-grid">
        <div class="stat"><div class="value" id="statTotal">0</div><div class="label">Total Events</div></div>
        <div class="stat"><div class="value" id="statForward">0</div><div class="label">Forwards</div></div>
        <div class="stat"><div class="value" id="statSSH">0</div><div class="label">SSH Cmds</div></div>
        <div class="stat"><div class="value" id="statPending">0</div><div class="label">Pending</div></div>
        <div class="stat"><div class="value" id="statAuth">0</div><div class="label">Auth Fails</div></div>
        <div class="stat"><div class="value" id="statLedger">0</div><div class="label">Ledger</div></div>
      </div>
    </div>
    <div class="card">
      <h2>Pending Approvals</h2>
      <div id="approvalList"><div class="empty">No pending approvals</div></div>
    </div>
  </div>
</div>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  let token = params.get('token') || '';
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';


  const feedEl = document.getElementById('feed');
  const sshListEl = document.getElementById('sshList');
  const approvalListEl = document.getElementById('approvalList');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const uptimeEl = document.getElementById('uptime');
  let ws = null;
  let retryDelay = 1000;
  let maxRetry = 30000;
  let eventCounts = {};
  let sshEvents = [];
  let startTime = Date.now();
  let feedEmpty = true;

  function connect() {
    ws = new WebSocket(wsProto + '//' + location.host + '/ws/activity?token=' + encodeURIComponent(token));
    ws.onopen = function() {
    };
    ws.onmessage = function(e) {
      const msg = JSON.parse(e.data);
      if (msg.type === 'authenticated') {
        statusDot.className = 'status-dot connected';
        statusText.textContent = 'Connected';
        retryDelay = 1000;
        fetchStats();
        return;
      }
      if (msg.type === 'error') {
        statusText.textContent = 'Auth failed';
        return;
      }
      handleEvent(msg);
    };
    ws.onclose = function() {
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = 'Reconnecting...';
      setTimeout(connect, retryDelay);
      retryDelay = Math.min(retryDelay * 2, maxRetry);
    };
    ws.onerror = function() { ws.close(); };
  }

  function handleEvent(ev) {
    // Count
    eventCounts[ev.type] = (eventCounts[ev.type] || 0) + 1;
    updateStatCounters();

    // Feed
    if (feedEmpty) { feedEl.innerHTML = ''; feedEmpty = false; }
    const div = document.createElement('div');
    div.className = 'event' + (ev.severity === 'warning' ? ' severity-warning' : '') + (ev.severity === 'critical' ? ' severity-critical' : '');
    const t = ev.timestamp ? new Date(ev.timestamp) : new Date();
    div.innerHTML = '<span class="time">' + t.toLocaleTimeString() + '</span>'
      + '<span class="badge ' + ev.type + '">' + ev.type.replace(/_/g,' ') + '</span>'
      + '<span class="summary">' + esc(ev.summary) + '</span>';
    feedEl.prepend(div);
    // Keep max 200
    while (feedEl.children.length > 200) feedEl.removeChild(feedEl.lastChild);

    // SSH events
    if (ev.type === 'ssh_exec' || ev.type === 'ssh_denied') {
      sshEvents.unshift(ev);
      if (sshEvents.length > 20) sshEvents.pop();
      renderSSH();
    }

    // Approval events
    if (ev.type === 'approval_submitted') fetchStats();

    // Critical alert
    if (ev.severity === 'critical') {
      if (Notification.permission === 'granted') {
        new Notification('⚠️ SecureClaw Alert', {body: ev.summary});
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
      }
    }
  }

  function renderSSH() {
    if (!sshEvents.length) return;
    sshListEl.innerHTML = sshEvents.map(function(ev) {
      const host = ev.details && ev.details.host || '?';
      const cmd = ev.details && ev.details.command || ev.summary;
      const ok = ev.type === 'ssh_exec';
      return '<div class="ssh-item"><span class="host">' + esc(host) + '</span> '
        + '<span class="cmd">' + esc(cmd.substring(0,80)) + '</span> '
        + '<span class="' + (ok ? 'status-ok' : 'status-fail') + '">' + (ok ? '✓' : '✗') + '</span></div>';
    }).join('');
  }

  function updateStatCounters() {
    const total = Object.values(eventCounts).reduce(function(a,b){return a+b},0);
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statForward').textContent = eventCounts['forward'] || 0;
    document.getElementById('statSSH').textContent = (eventCounts['ssh_exec'] || 0) + (eventCounts['ssh_denied'] || 0);
    document.getElementById('statAuth').textContent = eventCounts['auth_failed'] || 0;
  }

  function fetchStats() {
    fetch('/dashboard/stats', {headers:{'Authorization':'Bearer ' + token}})
      .then(function(r){return r.json()})
      .then(function(data){
        document.getElementById('statLedger').textContent = data.ledger_entries || 0;
        document.getElementById('statPending').textContent = data.pending_approvals || 0;
        if (data.uptime_seconds) startTime = Date.now() - data.uptime_seconds * 1000;
        // Merge server-side event counts
        if (data.events_by_type) {
          for (var k in data.events_by_type) {
            eventCounts[k] = Math.max(eventCounts[k] || 0, data.events_by_type[k]);
          }
          updateStatCounters();
        }
        renderApprovals(data.pending_approval_items || []);
      }).catch(function(){});
  }

  function renderApprovals(items) {
    if (!items.length) {
      approvalListEl.innerHTML = '<div class="empty">No pending approvals</div>';
      return;
    }
    approvalListEl.innerHTML = items.map(function(item) {
      return '<div class="approval-item">'
        + '<div class="desc"><strong>' + esc(item.action_type) + '</strong>: ' + esc(item.description) + '</div>'
        + '<div class="actions">'
        + '<button class="btn btn-approve" data-id="' + esc(item.request_id) + '" data-action="approve">Approve</button>'
        + '<button class="btn btn-reject" data-id="' + esc(item.request_id) + '" data-action="reject">Reject</button>'
        + '</div></div>';
    }).join('');
  }

  approvalListEl.addEventListener('click', function(evt) {
    const btn = evt.target.closest('[data-id]');
    if (!btn) return;
    const id = btn.dataset.id;
    const approved = btn.dataset.action === 'approve';
    fetch('/approve/' + encodeURIComponent(id) + '/decide', {
      method: 'POST',
      headers: {'Authorization':'Bearer ' + token, 'Content-Type':'application/json'},
      body: JSON.stringify({request_id: id, approved: approved, reason: 'Dashboard decision'})
    }).then(function(){ fetchStats(); });
  });

  function updateUptime() {
    var s = Math.floor((Date.now() - startTime) / 1000);
    var h = Math.floor(s/3600); s %= 3600;
    var m = Math.floor(s/60); s %= 60;
    uptimeEl.textContent = 'Uptime: ' + h + 'h ' + m + 'm ' + s + 's';
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  setInterval(updateUptime, 1000);
  setInterval(fetchStats, 30000);
  // Connect WS: use token from URL if available, otherwise fetch via cookie auth
  if (token) {
    connect();
  } else {
    fetch('/dashboard/ws-token', {credentials: 'same-origin'})
      .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function(d) { token = d.token; connect(); })
      .catch(function() { console.warn('Could not fetch WS token'); });
  }
  if (Notification.permission === 'default') Notification.requestPermission();
})();
</script>
</body>
</html>
