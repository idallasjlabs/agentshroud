# Pre-commit hooks for secret detection and security
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Gitleaks - Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  # Pre-commit built-in hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=10000']  # 10MB limit
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # Detect-secrets - Advanced secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^gateway/
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: ^gateway/

  # Semgrep - SAST for Python gateway source (IEC 62443 4-1 SDL)
  # Catches: command injection, path traversal, hardcoded secrets, SSRF
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.60.1
    hooks:
      - id: semgrep
        name: semgrep (agentshroud rules)
        args: ['--config', '.semgrep.yml', '--error', '--quiet']
        types: [python]
        files: ^gateway/
