title = "AgentShroud Gitleaks Configuration"

# =============================================================================
# RULES — Detect real secrets before they're committed
# =============================================================================

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot API Token"
regex = '''[0-9]{8,10}:AA[A-Za-z0-9_-]{33,}'''
keywords = ["telegram", "bot", "token"]

[[rules]]
id = "generic-api-key-header"
description = "API key in Authorization header"
regex = '''(?i)(Authorization|Bearer|x-api-key)\s*[:=]\s*[A-Za-z0-9_\-\.]{20,}'''
keywords = ["authorization", "bearer", "api-key"]

[[rules]]
id = "hex-token-64"
description = "64-character hex token (gateway password, SHA-256)"
regex = '''[0-9a-f]{64}'''
keywords = ["token", "password", "secret", "auth"]

[[rules]]
id = "icloud-app-password"
description = "Apple iCloud app-specific password"
regex = '''[a-z]{4}-[a-z]{4}-[a-z]{4}-[a-z]{4}'''
keywords = ["icloud", "apple", "app-specific"]

[[rules]]
id = "1password-service-account"
description = "1Password Service Account Token"
regex = '''ops_[A-Za-z0-9_\-]{40,}'''
keywords = ["1password", "op_service"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{20,}'''
keywords = ["openai", "api_key"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[A-Za-z0-9_\-]{20,}'''
keywords = ["anthropic", "api_key"]

[[rules]]
id = "github-token"
description = "GitHub Personal Access Token"
regex = '''ghp_[A-Za-z0-9]{36}'''
keywords = ["github"]

[[rules]]
id = "github-fine-grained"
description = "GitHub Fine-Grained Token"
regex = '''github_pat_[A-Za-z0-9_]{22,}'''
keywords = ["github"]

[[rules]]
id = "brave-api-key"
description = "Brave Search API Key"
regex = '''BSA[A-Za-z0-9_\-]{20,}'''
keywords = ["brave", "search"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[A-Z0-9]{16}'''
keywords = ["aws"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws(.{0,20})?(?-i)['\"][0-9a-zA-Z/+]{40}['\"]'''
keywords = ["aws", "secret"]

[[rules]]
id = "generic-password-assignment"
description = "Hardcoded password assignment"
regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['"][^'"]{8,}['"]'''
keywords = ["password", "passwd"]
[rules.allowlist]
regexes = [
    '''password\s*[:=]\s*['"](test|example|placeholder|changeme|xxx|your-password-here)['"]''',
    '''get_?password''',
    '''password.*field''',
    '''label.*password''',
]
paths = [
    '''gateway/tests/''',
    '''docs/redteam/''',
    '''examples/''',
]

[[rules]]
id = "private-key-block"
description = "PEM Private Key"
regex = '''-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'''
keywords = ["private key", "BEGIN"]

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-[0-9A-Za-z\-]{10,}'''
keywords = ["slack"]

[[rules]]
id = "generic-secret-env"
description = "Secret in environment variable assignment"
regex = '''(?i)(secret|api_key|apikey|access_token)\s*=\s*['"][A-Za-z0-9_\-\.]{10,}['"]'''
keywords = ["secret", "api_key", "access_token"]
[rules.allowlist]
paths = [
    '''gateway/tests/''',
    '''examples/''',
    '''docs/''',
]

# =============================================================================
# GLOBAL ALLOWLIST — Known false positives
# =============================================================================

[allowlist]
description = "Global allowlist for known false positives"
regexes = [
    '''REDACTED''',
    '''your-64-char-hex-token-here''',
    '''your-password-here''',
    '''example\.com''',
    '''e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855''',  # SHA-256 of empty string (used in docs)
]
paths = [
    '''gitleaks\.toml$''',
    '''\.gitallowed$''',
    '''\.gitignore$''',
    '''docs/security/secret-scan-results\.md$''',
    '''docs/security/history-purge-plan\.md$''',
]
