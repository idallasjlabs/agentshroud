<!-- Wazuh agent configuration — AgentShroud Gateway container -->
<!-- Monitors gateway application code, security reports, and Falco alerts. -->
<ossec_config>
  <client>
    <server>
      <address>127.0.0.1</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <!-- No real manager — agent runs standalone for local FIM/log analysis -->
    <auto_restart>no</auto_restart>
  </client>

  <!-- File integrity monitoring — gateway application paths -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>1800</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore>no</auto_ignore>

    <!-- Monitor gateway source code -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/app/gateway</directories>

    <!-- Monitor security scan reports -->
    <directories check_all="yes" realtime="yes">/var/log/security</directories>

    <!-- Ignore transient/generated files -->
    <ignore>/app/gateway/__pycache__</ignore>
    <ignore type="sregex">.pyc$</ignore>
    <ignore type="sregex">.log$</ignore>
  </syscheck>

  <!-- Rootcheck disabled — gateway runs as non-root; rootcheck requires elevated privs -->
  <rootcheck>
    <disabled>yes</disabled>
  </rootcheck>

  <!-- Falco runtime alert ingestion -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/falco/falco_alerts.json</location>
  </localfile>

  <!-- Alert level -->
  <alerts>
    <log_alert_level>3</log_alert_level>
  </alerts>

  <!-- Active response disabled (read-only agent) -->
  <active-response>
    <disabled>yes</disabled>
  </active-response>
</ossec_config>
