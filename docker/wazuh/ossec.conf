<!-- Wazuh agent configuration for AgentShroud -->
<ossec_config>
  <client>
    <server>
      <address>127.0.0.1</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <!-- File integrity monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>1800</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore>no</auto_ignore>

    <!-- Monitor workspace -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/host/workspace</directories>

    <!-- Monitor security reports -->
    <directories check_all="yes" realtime="yes">/host/security-reports</directories>

    <!-- Ignore transient files -->
    <ignore>/host/workspace/.git</ignore>
    <ignore>/host/workspace/__pycache__</ignore>
    <ignore>/host/workspace/node_modules</ignore>
    <ignore>/host/workspace/.cache</ignore>
    <ignore type="sregex">.pyc$</ignore>
    <ignore type="sregex">.log$</ignore>
  </syscheck>

  <!-- Rootcheck -->
  <rootcheck>
    <disabled>no</disabled>
    <check_unixaudit>yes</check_unixaudit>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>7200</frequency>
  </rootcheck>

  <!-- Log analysis -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/security/alerts/alerts.jsonl</location>
  </localfile>

  <!-- Alert level -->
  <alerts>
    <log_alert_level>7</log_alert_level>
  </alerts>

  <!-- Active response disabled (read-only agent) -->
  <active-response>
    <disabled>yes</disabled>
  </active-response>
</ossec_config>
