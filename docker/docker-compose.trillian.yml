# Trillian Instance (Intel Mac Mini 2018)
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.trillian.yml -p agentshroud-trillian up -d
# Bot: @agentshroud_trillian_bot
# Ports: gateway 8080, bot 18789
# Note: Trillian has limited resources (2 CPUs, ~2GB RAM) — reduced limits
services:
  gateway:
    ports: !override
      - "127.0.0.1:8080:8080"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.5

  agentshroud:
    hostname: trillian
    ports: !override
      - "127.0.0.1:18789:18789"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - GATEWAY_OP_PROXY_URL=http://gateway:8080
      - OPENCLAW_BOT_NAME=agentshroud_bot_trillian
      - OPENCLAW_BOT_EMAIL=agentshroud.ai@icloud.com
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
    secrets:
      - gateway_password
      - telegram_bot_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.0

secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_trillian.txt
