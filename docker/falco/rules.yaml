# AgentShroud Falco rules
# Self-contained: macros are defined here so no dependency on falco_rules.yaml.

# ---------------------------------------------------------------------------
# Macros
# ---------------------------------------------------------------------------

- macro: spawned_process
  condition: (evt.type in (execve, execveat) and evt.dir=<)

- macro: container
  condition: (container.id != "host")

- macro: outbound
  condition: >
    (evt.type in (connect) and evt.dir=< and
     (fd.typechar=4 or fd.typechar=6) and
     fd.connected=true and fd.name_changed=true and
     not fd.sip in ("0.0.0.0", "127.0.0.1"))

- macro: open_write
  condition: >
    (evt.type in (open, openat, openat2) and
     evt.is_open_write=true and fd.typechar='f' and fd.num>=0)

- macro: open_read
  condition: >
    (evt.type in (open, openat, openat2) and
     evt.is_open_read=true and fd.typechar='f' and fd.num>=0)

# ---------------------------------------------------------------------------
# Rules
# ---------------------------------------------------------------------------

- rule: Container Shell Spawned
  desc: Detect shell spawned inside a container
  condition: >
    spawned_process and container and
    proc.name in (bash, sh, zsh, dash, csh, ksh, fish) and
    not proc.pname in (start-agentshroud.sh, entrypoint-agentshroud.sh,
                       security-entrypoint.sh, security-scheduler.sh,
                       security-scan.sh)
  output: "Shell spawned in container (user=%user.name shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline)"
  priority: WARNING
  tags: [agentshroud, shell, container]

- rule: Unexpected Outbound Connection from AgentShroud
  desc: Detect outbound network connections from agentshroud container
  condition: >
    outbound and container and container.name = "agentshroud" and
    not fd.sip = "127.0.0.1" and not fd.sip = "0.0.0.0"
  output: "Unexpected outbound connection from AgentShroud (connection=%fd.name dest=%fd.sip user=%user.name process=%proc.name)"
  priority: ERROR
  tags: [agentshroud, network]

- rule: File Access Outside Workspace
  desc: Detect file write access outside the designated workspace directory
  condition: >
    open_write and container and container.name = "agentshroud" and
    not fd.name startswith /home/node/ and
    not fd.name startswith /tmp/ and
    not fd.name startswith /proc/ and
    not fd.name startswith /dev/null
  output: "File write outside workspace (file=%fd.name user=%user.name process=%proc.name)"
  priority: ERROR
  tags: [agentshroud, filesystem]

- rule: Privilege Escalation Attempt
  desc: Detect attempts to escalate privileges inside containers
  condition: >
    spawned_process and container and
    (proc.name in (sudo, su, newgrp, setuid) or
     (proc.name = "chmod" and proc.args contains "+s"))
  output: "Privilege escalation attempt (user=%user.name process=%proc.name cmdline=%proc.cmdline)"
  priority: CRITICAL
  tags: [agentshroud, privilege_escalation]

- rule: Secret File Access
  desc: Detect access to sensitive files (shadow, SSH keys, etc.)
  condition: >
    open_read and container and
    (fd.name = "/etc/shadow" or
     fd.name startswith "/etc/ssh/ssh_host" or
     fd.name startswith "/root/.ssh/" or
     fd.name contains "id_rsa" or
     fd.name contains "id_ed25519")
  output: "Sensitive file accessed (file=%fd.name user=%user.name process=%proc.name)"
  priority: CRITICAL
  tags: [agentshroud, secrets]

- rule: Crypto Mining Detection
  desc: Detect potential cryptocurrency mining activity
  condition: >
    spawned_process and container and
    (proc.name in (xmrig, minerd, minergate, cpuminer, ethminer) or
     proc.cmdline contains "stratum+tcp" or
     proc.cmdline contains "stratum+ssl" or
     proc.cmdline contains "cryptonight" or
     proc.cmdline contains "--coin=")
  output: "Crypto mining activity detected (user=%user.name process=%proc.name cmdline=%proc.cmdline)"
  priority: CRITICAL
  tags: [agentshroud, cryptomining]
