# Falco configuration for AgentShroud
# Pinned to Falco 0.38.2 — stable schema, built-in container support
# JSON output for programmatic parsing by scanner_integration.py

json_output: true
json_include_output_property: true
json_include_tags_property: true

log_stderr: true
log_syslog: false
log_level: warning

# Custom rules only — macros defined inline in agentshroud.yaml
rules_files:
  - /etc/falco/rules.d/agentshroud.yaml

# File output — gateway reads /var/log/falco/falco-events.json
file_output:
  enabled: true
  keep_alive: true
  filename: /var/log/falco/falco-events.json

# Stdout output (for docker logs)
stdout_output:
  enabled: true
