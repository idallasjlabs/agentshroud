# Copyright © 2026 Isaiah Dallas Jefferson, Jr. AgentShroud™. All rights reserved.
#
# IEC 62443 FR6 (Timely Response to Events) — centralized log collection.
# Collects all container logs and forwards to Wazuh and local archive.
#
# Sidecar container reads Docker logs via the Docker Engine socket.
# Output: Wazuh manager (syslog), local file archive, optional S3.
#
# Usage: fluent-bit -c /fluent-bit/etc/fluent-bit.conf

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Parsers_File  parsers.conf

# ---------------------------------------------------------------------------
# Inputs — collect logs from all agentshroud containers via Docker socket
# ---------------------------------------------------------------------------

[INPUT]
    Name              docker
    Tag               agentshroud.gateway
    Containers        agentshroud-gateway
    Docker_Mode       true
    Docker_Mode_Flush 5

[INPUT]
    Name              docker
    Tag               agentshroud.bot
    Containers        agentshroud-bot
    Docker_Mode       true
    Docker_Mode_Flush 5

[INPUT]
    Name              docker
    Tag               agentshroud.falco
    Containers        agentshroud-falco
    Docker_Mode       true
    Docker_Mode_Flush 5

# Tail Falco alert file directly for structured JSON
[INPUT]
    Name              tail
    Tag               agentshroud.falco.alerts
    Path              /var/log/falco/falco-events.json
    Parser            json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB

# ---------------------------------------------------------------------------
# Filters — enrich and normalize records
# ---------------------------------------------------------------------------

[FILTER]
    Name   record_modifier
    Match  agentshroud.*
    Record stack agentshroud
    Record version v0.9.0

# Parse JSON log lines from gateway (FastAPI structured logs)
[FILTER]
    Name   parser
    Match  agentshroud.gateway
    Key_Name log
    Parser json
    Reserve_Data On

# Classify Falco alerts by severity for downstream routing
[FILTER]
    Name   grep
    Match  agentshroud.falco.alerts
    Regex  priority (Critical|Alert|Emergency|Error)

# ---------------------------------------------------------------------------
# Outputs — forward to Wazuh syslog and local archive
# ---------------------------------------------------------------------------

# Wazuh manager syslog input (agent forwards via syslog protocol)
[OUTPUT]
    Name          syslog
    Match         agentshroud.*
    Host          wazuh-manager
    Port          514
    Mode          tcp
    Syslog_Format rfc5424
    Syslog_Severity_Key severity
    Syslog_Hostname_Key stack

# Local file archive — JSON lines, rotated daily
# Retained for incident forensics and IEC 62443 compliance audit evidence
[OUTPUT]
    Name          file
    Match         agentshroud.*
    Path          /var/log/fluent-bit
    File          agentshroud-${HOSTNAME}.log
    Format        json_lines

# Falco critical alerts to separate high-priority log file
[OUTPUT]
    Name          file
    Match         agentshroud.falco.alerts
    Path          /var/log/fluent-bit
    File          falco-critical.log
    Format        json_lines

# ---------------------------------------------------------------------------
# Optional: S3 archival (uncomment for production long-term retention)
# Requires AWS credentials via environment or instance profile.
# ---------------------------------------------------------------------------

