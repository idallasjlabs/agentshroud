#
# IEC 62443 FR6 (Timely Response to Events) — centralized log collection.
# Collects all container logs and forwards to Wazuh and local archive.
#
# Compatible with Fluent Bit 3.2+
# Usage: fluent-bit -c /fluent-bit/etc/fluent-bit.conf

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Parsers_File  parsers.conf

# ---------------------------------------------------------------------------
# Inputs
# ---------------------------------------------------------------------------

# Falco JSON alert file — written by Falco's file_output plugin.
# tail input tolerates a missing file and waits for it to appear.
[INPUT]
    Name             tail
    Tag              agentshroud.falco.alerts
    Path             /var/log/falco/falco_alerts.json
    Parser           json
    Read_from_Head   On
    Refresh_Interval 5
    Skip_Empty_Lines On

# ClamAV scan reports — written by security-scan.sh
[INPUT]
    Name             tail
    Tag              agentshroud.clamav
    Path             /var/log/security/clamav/*.json
    Parser           json
    Read_from_Head   On
    Refresh_Interval 30
    Skip_Empty_Lines On

# Wazuh alert output — written by wazuh-agentd running in the gateway
[INPUT]
    Name             tail
    Tag              agentshroud.wazuh
    Path             /var/ossec/logs/alerts/alerts.json
    Parser           json
    Read_from_Head   On
    Refresh_Interval 10
    Skip_Empty_Lines On

# ---------------------------------------------------------------------------
# Filters — enrich and normalize records
# ---------------------------------------------------------------------------

[FILTER]
    Name   record_modifier
    Match  agentshroud.*
    Record stack agentshroud
    Record version v0.9.0

# Parse JSON log lines from gateway (FastAPI structured logs)
[FILTER]
    Name   parser
    Match  agentshroud.containers
    Key_Name log
    Parser json
    Reserve_Data On

# Classify Falco alerts by priority field
[FILTER]
    Name   grep
    Match  agentshroud.falco.alerts
    Regex  priority (Critical|Error|Warning|Notice|Informational)

# ---------------------------------------------------------------------------
# Outputs — forward to local archive
# ---------------------------------------------------------------------------

# Local file archive — rotated daily
# Retained for incident forensics and IEC 62443 compliance audit evidence
[OUTPUT]
    Name          file
    Match         agentshroud.*
    Path          /var/log/fluent-bit
    File          agentshroud-${HOSTNAME}.log

# Falco critical/error alerts — separate file for rapid triage
[OUTPUT]
    Name          file
    Match         agentshroud.falco.alerts
    Path          /var/log/fluent-bit
    File          falco-critical-${HOSTNAME}.log

# ---------------------------------------------------------------------------
# Optional: S3 archival (uncomment for production long-term retention)
# Requires AWS credentials via environment or instance profile.
