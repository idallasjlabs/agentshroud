# AgentShroud Dev/Test Instance — Trillian host (Intel Mac Mini 2018), agentshroud-bot user
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.agentshroud-bot.trillian.yml -p agentshroud up -d
# Bot: @agentshroud_trillian_bot
# Ports: gateway 8080, bot 18789 (no conflict — separate host)
# Note: Trillian has limited resources (2 CPUs, ~2GB RAM) — reduced limits
services:
  gateway:
    ports: !override
      - "127.0.0.1:8080:8080"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.5

  bot:
    hostname: trillian
    ports: !override
      - "127.0.0.1:18789:18789"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - GATEWAY_OP_PROXY_URL=http://gateway:8080
      - OPENCLAW_BOT_NAME=agentshroud_bot_trillian
      - OPENCLAW_BOT_EMAIL=agentshroud.ai@icloud.com
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1
      # Route ALL outbound internet through gateway HTTP CONNECT proxy
      - HTTP_PROXY=http://gateway:8181
      - HTTPS_PROXY=http://gateway:8181
      # Bypass proxy for internal container-to-container traffic
      - NO_PROXY=gateway,localhost,127.0.0.1,pihole
      # Route Telegram API through gateway
      - TELEGRAM_API_BASE_URL=http://gateway:8080/telegram-api
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
    secrets:
      - gateway_password
      - telegram_bot_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.0

  # ── Security sidecars — Trillian resource limits ─────────────────────────────
  # Trillian: Intel Mac Mini 2018, ~2GB RAM, 2 CPUs. Constrain sidecars tightly.
  falco:
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.25

  clamav:
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.25

  wazuh-agent:
    mem_limit: 128m
    memswap_limit: 128m
    cpus: 0.1

  fluent-bit:
    mem_limit: 64m
    memswap_limit: 64m
    cpus: 0.1

secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_trillian.txt
