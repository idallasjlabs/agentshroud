# AgentShroud — Trillian host, agentshroud-bot user
# Separate host — no port or subnet conflicts with other instances.
#
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.agentshroud-bot.trillian.yml -p agentshroud up -d
services:
  gateway:
    environment:
      - AGENTSHROUD_COMPOSE_HOST=trillian
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.5

  bot:
    environment:
      - OPENCLAW_BOT_NAME=agentshroud_bot_trillian
      - AGENTSHROUD_CONTROL_UI_ORIGINS=https://trillian.tail240ea8.ts.net:18790,http://trillian.tail240ea8.ts.net:18790
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.0

secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_trillian.txt
