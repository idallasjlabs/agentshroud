# AgentShroud Dev/Test Instance — Marvin host, agentshroud-bot user
# Same host as prod (ijefferson.admin). Ports and subnets offset to avoid conflicts.
#
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.agentshroud-bot.marvin.yml -p agentshroud-dev up -d
#
# Prod (ijefferson.admin):  gateway 8080,  bot 18790,  nets 10.254.110/111/112.0/24
# Dev  (agentshroud-bot):   gateway 9080,  bot 19789,  nets 172.20/172.21/172.22.0.0/16
#
# All three bridge subnets must be overridden here. Docker refuses to create a
# bridge network with a subnet already allocated by another network on the host,
# even when the Docker Compose project names differ.
services:
  gateway:
    container_name: agentshroud-dev-gateway
    ports: !override
      - "127.0.0.1:9080:8080"
    environment:
      - AGENTSHROUD_INSTANCE=marvin-dev
      - PROXY_ALLOWED_NETWORKS=172.20.0.0/16,172.21.0.0/16,172.22.0.0/16
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
    secrets:
      - telegram_bot_token

  bot:
    container_name: agentshroud-dev-bot
    hostname: agentshroud-dev
    ports: !override
      - "127.0.0.1:19789:18789"
    environment:
      - NODE_ENV=development
      - GATEWAY_HOST_PORT=9080
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - GATEWAY_OP_PROXY_URL=http://gateway:8080
      - OPENCLAW_BOT_NAME=agentshroud_bot
      - OPENCLAW_BOT_EMAIL=agentshroud.ai@icloud.com
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1
      # Route ALL Telegram API calls through AgentShroud gateway
      - TELEGRAM_API_BASE_URL=http://gateway:8080/telegram-api
      # Route ALL LLM API calls through gateway for message scanning
      - ANTHROPIC_BASE_URL=http://gateway:8080
      # Route ALL outbound HTTP through gateway CONNECT proxy
      - HTTP_PROXY=http://gateway:8181
      - HTTPS_PROXY=http://gateway:8181
      # Exclude internal gateway from proxy
      - NO_PROXY=gateway,localhost,127.0.0.1
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
    secrets:
      - gateway_password
      - telegram_bot_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "marvin.tail240ea8.ts.net:host-gateway"

secrets:
  # All secrets point to /Users/Shared/agentshroud-dev-secrets/ so they are visible
  # to the Colima Lima VM (which mounts /Users/Shared but not /Users/agentshroud-bot).
  #
  # One-time setup (run as agentshroud-bot):
  #   mkdir -p /Users/Shared/agentshroud-dev-secrets
  #   chmod 755 /Users/Shared/agentshroud-dev-secrets
  #   for f in gateway_password anthropic_oauth_token openai_api_key google_api_key \
  #             1password_bot_email 1password_bot_master_password 1password_bot_secret_key \
  #             slack_bot_token slack_signing_secret slack_app_token; do
  #     cp ~/Development/agentshroud/docker/secrets/${f}.txt \
  #        /Users/Shared/agentshroud-dev-secrets/${f}.txt
  #     chmod 644 /Users/Shared/agentshroud-dev-secrets/${f}.txt
  #   done
  #   cp ~/Development/agentshroud/docker/secrets/telegram_bot_token_marvin.txt \
  #      /Users/Shared/agentshroud-dev-secrets/telegram_bot_token_marvin.txt
  #   chmod 644 /Users/Shared/agentshroud-dev-secrets/telegram_bot_token_marvin.txt
  gateway_password:
    file: /Users/Shared/agentshroud-dev-secrets/gateway_password.txt
  anthropic_oauth_token:
    file: /Users/Shared/agentshroud-dev-secrets/anthropic_oauth_token.txt
  openai_api_key:
    file: /Users/Shared/agentshroud-dev-secrets/openai_api_key.txt
  google_api_key:
    file: /Users/Shared/agentshroud-dev-secrets/google_api_key.txt
  1password_bot_email:
    file: /Users/Shared/agentshroud-dev-secrets/1password_bot_email.txt
  1password_bot_master_password:
    file: /Users/Shared/agentshroud-dev-secrets/1password_bot_master_password.txt
  1password_bot_secret_key:
    file: /Users/Shared/agentshroud-dev-secrets/1password_bot_secret_key.txt
  telegram_bot_token:
    file: /Users/Shared/agentshroud-dev-secrets/telegram_bot_token_marvin.txt
  slack_bot_token:
    file: /Users/Shared/agentshroud-dev-secrets/slack_bot_token.txt
  slack_signing_secret:
    file: /Users/Shared/agentshroud-dev-secrets/slack_signing_secret.txt
  slack_app_token:
    file: /Users/Shared/agentshroud-dev-secrets/slack_app_token.txt

# openclaw-runtime was previously created under project "agentshroud-dev".
# external: true tells Compose to use the existing volume as-is without
# complaining about project-name ownership mismatch.
volumes:
  openclaw-runtime:
    external: true

# All three bridge subnets offset from prod (10.254.110-112.0/24) to prevent
# Docker refusing to allocate duplicate subnets on the same host.
networks:
  agentshroud-internal:
    ipam:
      config: !override
        - subnet: 172.20.0.0/16
  agentshroud-isolated:
    ipam:
      config: !override
        - subnet: 172.21.0.0/16
  agentshroud-console:
    ipam:
      config: !override
        - subnet: 172.22.0.0/16
