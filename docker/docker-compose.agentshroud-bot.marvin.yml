# AgentShroud — Marvin host, agentshroud-bot user
# Runs on the same physical host and Docker daemon as prod (ijefferson.admin).
# Ports and subnets are offset to avoid conflicts with the prod instance.
#
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.agentshroud-bot.marvin.yml -p agentshroud up -d
#
# Prod (ijefferson.admin):    gateway 8080,  bot 18789,  nets 10.254.110/111/112.0/24
# This (agentshroud-bot):     gateway 9080,  bot 18790,  nets 172.20/172.21/172.22.0.0/16
#
# One-time host setup (required before first run):
#   sudo chmod 755 /Users/agentshroud-bot
#   (allows Colima's virtiofs to mount /Users/agentshroud-bot so ./secrets/ is visible to Docker)
services:
  gateway:
    container_name: agentshroud-marvin-gateway
    ports: !override
      - "127.0.0.1:9080:8080"
    environment:
      - PROXY_ALLOWED_NETWORKS=172.20.0.0/16,172.21.0.0/16,172.22.0.0/16
      - AGENTSHROUD_INSTANCE_LABEL=dev-marvin

  bot:
    container_name: agentshroud-marvin-bot
    ports: !override
      - "127.0.0.1:18790:18789"
    environment:
      - GATEWAY_HOST_PORT=9080
      - OPENCLAW_BOT_NAME=agentshroud_bot_marvin
      - AGENTSHROUD_INSTANCE_LABEL=dev-marvin
      - AGENTSHROUD_CONTROL_UI_ORIGINS=${AGENTSHROUD_CONTROL_UI_ORIGINS:-http://localhost:18790,https://localhost:18790}

secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_marvin.txt

# All three networks offset from prod (10.254.110-112.0/24) to prevent pool overlap on the same host.
networks:
  agentshroud-internal:
    ipam:
      config: !override
        - subnet: 172.20.0.0/24
  agentshroud-isolated:
    ipam:
      config: !override
        - subnet: 172.21.0.0/24
  agentshroud-console:
    ipam:
      config: !override
        - subnet: 172.22.0.0/24
