# Marvin Test Instance (Colima / agentshroud-bot user)
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.marvin-test.yml -p agentshroud-marvin-test up -d
# Bot: @agentshroud_bot_marvin (test)
# Ports: gateway 9080, bot 19790
services:
  gateway:
    ports: !override
      - "127.0.0.1:9080:8080"

  agentshroud:
    hostname: marvin
    ports: !override
      - "127.0.0.1:19790:18789"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - GATEWAY_OP_PROXY_URL=http://gateway:8080
      - OPENCLAW_BOT_NAME=agentshroud_bot_marvin
      - OPENCLAW_BOT_EMAIL=agentshroud.ai@icloud.com
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
    secrets:
      - gateway_password
      - telegram_bot_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "marvin.tail240ea8.ts.net:host-gateway"

secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_marvin.txt
