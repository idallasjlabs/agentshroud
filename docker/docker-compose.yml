version: '3.8'

services:
  # SecureClaw Gateway (Phase 2) - PII sanitization, audit ledger, routing
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: secureclaw-gateway
    hostname: gateway
    restart: unless-stopped

    # Security: localhost-only binding
    ports:
      - "127.0.0.1:8080:8080"

    # Data persistence
    volumes:
      - ../secureclaw.yaml:/app/secureclaw.yaml:ro
      - gateway-data:/app/data

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # Gateway needs to write to ledger DB
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

    # Resource limits
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    pids_limit: 100

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network
    networks:
      - secureclaw-internal

  # OpenClaw Chat Agent (Phase 3) - Isaiah's persona + security hardening
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-chat
    hostname: openclaw
    restart: unless-stopped

    # Security: NO external ports exposed (internal network only)
    # Gateway communicates via internal network
    expose:
      - "18789"

    # Persona files (read-only)
    volumes:
      - ../tobeornottobe/IDENTITY.md:/workspace/IDENTITY:ro
      - ../tobeornottobe/SOUL.md:/workspace/SOUL.md:ro
      - ../tobeornottobe/USER.md:/workspace/USER:ro
      - openclaw-data:/home/openclaw/.openclaw/data

    # Secrets (Anthropic API key)
    secrets:
      - anthropic_api_key

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - OPENCLAW_DISABLE_BONJOUR=1  # Disable mDNS broadcasts
      - OPENCLAW_MODE=dm             # DM mode only (no open mode)
      - OPENCLAW_SCOPE=session       # Session isolation
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OPENCLAW_WORKSPACE=/workspace
      - OPENCLAW_DATA_DIR=/home/openclaw/.openclaw/data

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # OpenClaw needs to write conversation history
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /var/tmp:noexec,nosuid,size=50m

    # Resource limits
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0
    pids_limit: 256

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Network
    networks:
      - secureclaw-internal

    # Dependencies
    depends_on:
      gateway:
        condition: service_healthy

# Docker secrets (Anthropic API key)
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt

# Internal-only network (no external access)
networks:
  secureclaw-internal:
    driver: bridge
    internal: false  # Set to true for full isolation (no internet)
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Named volumes for data persistence
volumes:
  gateway-data:
    driver: local
  openclaw-data:
    driver: local
