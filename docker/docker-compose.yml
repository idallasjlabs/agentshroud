services:
  # SecureClaw Gateway (Phase 2) - PII sanitization, audit ledger, routing
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: secureclaw-gateway
    hostname: gateway
    restart: unless-stopped

    # Security: localhost-only binding
    ports:
      - "127.0.0.1:8080:8080"

    # Data persistence
    volumes:
      - ../secureclaw.yaml:/app/secureclaw.yaml:ro
      - gateway-data:/app/data

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - PYTHONDONTWRITEBYTECODE=1

    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/gateway-seccomp.json
    cap_drop:
      - ALL
    read_only: true  # Read-only root filesystem with volume exceptions
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/tmp:noexec,nosuid,size=50m

    # Resource limits
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    pids_limit: 100

    # Health check (using Python since curl not installed in slim image)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/status').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network - Gateway on BOTH networks to act as proxy
    networks:
      - secureclaw-internal  # External (localhost access)
      - secureclaw-isolated  # Internal (to OpenClaw)

  # OpenClaw Bot (Real OpenClaw Platform) - therealidallasj
  # SECURITY: Fully isolated - NO host filesystem access, NO LAN access
  openclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile.openclaw
    container_name: openclaw-bot
    hostname: openclaw
    restart: unless-stopped

    # SECURITY: Port exposed to localhost only for UI access
    # Control UI accessible via: http://localhost:18790
    # NOTE: Using 18790 due to port conflict - change back to 18789 after Docker Desktop restart
    ports:
      - "127.0.0.1:18790:18789"

    # SECURITY: Only isolated Docker volumes - NO host directory mounts
    volumes:
      # OpenClaw config directory (API keys, settings, memory)
      - openclaw-config:/home/node/.openclaw
      # Bot's workspace (files the agent works with)
      - openclaw-workspace:/home/node/openclaw/workspace
      # SSH keys for bot (generated inside container)
      - openclaw-ssh:/home/node/.ssh
      # Playwright browser binaries (persistent across restarts)
      - openclaw-browsers:/home/node/.cache/ms-playwright

    # Secrets (API keys and 1Password)
    secrets:
      - openai_api_key
      - anthropic_api_key
      - gateway_password
      - 1password_bot_email
      - 1password_bot_master_password
      - 1password_bot_secret_key

    # Environment variables
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan  # Allow Gateway to connect internally
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OP_SERVICE_ACCOUNT_TOKEN_FILE=/run/secrets/1password_service_account
      # Bot identity
      - OPENCLAW_BOT_NAME=therealidallasj_bot
      - OPENCLAW_BOT_EMAIL=therealidallasj@gmail.com
      # Security: Disable features that access host
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1

    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/openclaw-seccomp.json
    cap_drop:
      - ALL

    # SECURITY: Read-only root filesystem (DISABLED during development)
    # Enable after each phase for testing. See DEVELOPMENT_WORKFLOW_READ_ONLY.md
    read_only: true  # Production: read-only rootfs (use toggle-readonly.sh for dev)
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /var/tmp:noexec,nosuid,size=100m
      - /home/node/.npm:noexec,nosuid,size=200m
      - /home/node/.local:noexec,nosuid,size=100m
      - /home/node/.config:noexec,nosuid,size=100m
      # .cache/ms-playwright is now a volume (persistent browsers)

    # Resource limits (increased for Node.js + OpenClaw)
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 2.0
    pids_limit: 512

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # SECURITY: Isolated network - NO access to host LAN
    networks:
      - secureclaw-isolated

    # Dependencies
    depends_on:
      gateway:
        condition: service_healthy

# Docker secrets (API keys and 1Password)
secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  gateway_password:
    file: ./secrets/gateway_password.txt
  1password_bot_email:
    file: ./secrets/1password_bot_email.txt
  1password_bot_master_password:
    file: ./secrets/1password_bot_master_password.txt
  1password_bot_secret_key:
    file: ./secrets/1password_bot_secret_key.txt

# Network architecture for SecureClaw isolation
networks:
  # External network - Gateway accessible from localhost
  secureclaw-internal:
    driver: bridge
    internal: false  # Allows localhost access to Gateway
    ipam:
      config:
        - subnet: 172.20.0.0/16

  # Backend network - OpenClaw talks to Gateway and internet (LLM APIs)
  # NOTE: internal: false is required for outbound API calls to LLM providers
  # Network isolation is enforced via iptables/seccomp, not Docker networking
  secureclaw-isolated:
    driver: bridge
    internal: false  # Required for LLM API access (OpenAI, Anthropic, etc.)
    ipam:
      config:
        - subnet: 172.21.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "true"  # Inter-container communication
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"

# Named volumes for data persistence
volumes:
  gateway-data:
    driver: local
  openclaw-config:
    driver: local
  openclaw-workspace:
    driver: local
  openclaw-ssh:
    driver: local
  openclaw-browsers:
    driver: local
