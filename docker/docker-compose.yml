services:
  # AgentShroud Gateway (Phase 2) - PII sanitization, audit ledger, routing
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: agentshroud-gateway
    hostname: gateway
    restart: unless-stopped
    stop_grace_period: 15s

    # Security: localhost-only binding
    ports:
      - "127.0.0.1:8080:8080"

    # Data persistence
    volumes:

      - ../agentshroud.yaml:/app/agentshroud.yaml:ro

      # SSH keys for gateway SSH proxy (read-only — keys generated in bot container)
      - agentshroud-ssh:/var/agentshroud-ssh:ro

      - gateway-data:/app/data
      - ../web:/app/web:ro
      - agentshroud-workspace:/data/bot-workspace:ro

    # Secrets
    secrets:
      - gateway_password
      - 1password_service_account

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - PYTHONDONTWRITEBYTECODE=1
      - GATEWAY_AUTH_TOKEN_FILE=/run/secrets/gateway_password
      - OP_SERVICE_ACCOUNT_TOKEN_FILE=/run/secrets/1password_service_account

    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/gateway-seccomp.json
    cap_drop:
      - ALL
    read_only: true  # Read-only root filesystem with volume exceptions
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/tmp:noexec,nosuid,size=50m

    # Resource limits
    mem_limit: 1280m
    memswap_limit: 1280m
    cpus: 1.0
    pids_limit: 100

    # Health check (using Python since curl not installed in slim image)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/status').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network - Gateway on BOTH networks to act as proxy
    networks:
      - agentshroud-internal  # External (localhost access)
      - agentshroud-isolated  # Internal (to AgentShroud)

  # AgentShroud Bot (Real AgentShroud Platform) - agentshroud.ai
  # SECURITY: Fully isolated - NO host filesystem access, NO LAN access
  agentshroud:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agentshroud
    container_name: agentshroud-bot
    hostname: agentshroud
    restart: unless-stopped
    stop_grace_period: 15s

    # SECURITY: Port exposed to localhost only for UI access
    # Control UI accessible via: http://localhost:18790
    # NOTE: Using 18790 due to port conflict - change back to 18789 after Docker Desktop restart
    ports:
      - "127.0.0.1:18790:18789"

    # SECURITY: Only isolated Docker volumes - NO host directory mounts
    volumes:
      # AgentShroud config directory (API keys, settings, memory)
      - agentshroud-config:/home/node/.agentshroud
      # Bot's workspace (files the agent works with)
      - agentshroud-workspace:/home/node/agentshroud/workspace
      # SSH keys for bot (generated inside container)
      - agentshroud-ssh:/home/node/.ssh
      # Playwright browser binaries (persistent across restarts)
      - agentshroud-browsers:/home/node/.cache/ms-playwright
      # Branding assets (read-only) — logos, colors, email templates, guidelines
      - ../branding:/app/branding:ro

    # Secrets: CREDENTIAL ISOLATION (R-11) — agent gets ONLY gateway_password
    # All API credentials removed from agent container per red team finding 05.
    # Credentials are gateway-only; agent uses op-proxy for 1Password,
    # gateway egress proxy for API key injection.
    secrets:
      - gateway_password
      - telegram_bot_token

    # Environment variables
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan  # Allow Gateway to connect internally
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
      # REMOVED: OPENAI_API_KEY_FILE — credentials now gateway-only (R-11)
      # FINAL: Route all outbound internet through gateway HTTP CONNECT proxy
      # - HTTP_PROXY=http://gateway:8181  # DISABLED: enable in FINAL phase
      # - HTTPS_PROXY=http://gateway:8181  # DISABLED: enable in FINAL phase
      # FINAL: Route 1Password credential lookups through gateway op-proxy endpoint
      - GATEWAY_OP_PROXY_URL=http://gateway:8080
      - ANTHROPIC_BASE_URL=http://gateway:8080
      # Route Telegram API calls through gateway for security scanning
      - TELEGRAM_API_BASE_URL=http://gateway:8080/telegram-api
      # Bot identity
      - OPENCLAW_BOT_NAME=agentshroud_bot
      - OPENCLAW_BOT_EMAIL=agentshroud.ai@icloud.com
      # Security: Disable features that access host
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1

    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/agentshroud-seccomp.json
    cap_drop:
      - ALL

    # SECURITY: Read-only root filesystem (DISABLED during development)
    # Enable after each phase for testing. See DEVELOPMENT_WORKFLOW_READ_ONLY.md
    read_only: true  # Production: read-only rootfs (use toggle-readonly.sh for dev)
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /var/tmp:noexec,nosuid,size=100m
      - /home/node/.npm:noexec,nosuid,size=200m
      - /home/node/.local:noexec,nosuid,size=100m
      - /home/node/.config:noexec,nosuid,size=100m,uid=1000,gid=1000
      # .cache/ms-playwright is now a volume (persistent browsers)

    # Resource limits (increased for Node.js + AgentShroud)
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 2.0
    pids_limit: 512

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # host.docker.internal → macOS host (for MCP servers that must run on host, e.g. mac-messages-mcp)
    # Tailscale hosts → static IPs: Docker's embedded DNS doesn't forward to Tailscale
    # the container. Pinned IPs bypass the DNS proxy entirely.
    # To update: run `tailscale ip --4 <hostname>` on the macOS host.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # SECURITY: Isolated network - NO access to host LAN
    networks:
      - agentshroud-isolated

    # Dependencies
    depends_on:
      gateway:
        condition: service_healthy

# Docker secrets (API keys and 1Password)
secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_oauth_token:
    file: ./secrets/anthropic_oauth_token.txt
  gateway_password:
    file: ./secrets/gateway_password.txt
  1password_bot_email:
    file: ./secrets/1password_bot_email.txt
  1password_bot_master_password:
    file: ./secrets/1password_bot_master_password.txt
  1password_bot_secret_key:
    file: ./secrets/1password_bot_secret_key.txt
  1password_service_account:
    file: ./secrets/1password_service_account
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_production.txt

# Network architecture for AgentShroud isolation
networks:
  # External network - Gateway accessible from localhost
  agentshroud-internal:
    driver: bridge
    internal: false  # Allows localhost access to Gateway
    ipam:
      config:
        - subnet: 172.20.0.0/16

  # Backend network - AgentShroud talks to Gateway ONLY
  # FINAL: internal: true — bot has no direct internet access.
  # All outbound traffic must go through the HTTP CONNECT proxy at gateway:8181.
  agentshroud-isolated:
    driver: bridge
    # NOTE: internal: true breaks macOS Docker Desktop host→container port forwarding.
    # Bot isolation enforced at application layer via HTTP_PROXY=http://gateway:8181.
    internal: false
    ipam:
      config:
        - subnet: 172.21.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"  # Inter-container communication

# Named volumes for data persistence
volumes:
  gateway-data:
    driver: local
  agentshroud-config:
    driver: local
  agentshroud-workspace:
    driver: local
  agentshroud-ssh:
    driver: local
  agentshroud-browsers:
    driver: local
