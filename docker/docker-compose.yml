# AgentShroud Docker Compose — Production (marvin / ijefferson.admin)
# Gateway: security proxy, DNS forwarder, API gateway, all security tools
# Bot: OpenClaw agent, minimal footprint
#
# Usage: docker compose -f docker/docker-compose.yml -p agentshroud up -d
#
# Copyright © 2026 Isaiah Dallas Jefferson, Jr. AgentShroud™. All rights reserved.

name: agentshroud

services:
  # ── Gateway ──────────────────────────────────────────────────────────────────
  # Security proxy, HTTP CONNECT proxy, DNS forwarder, API gateway.
  # SOLE egress point for all container traffic. All outbound logged.
  # Set AGENTSHROUD_VERSION=1.0.0 to build/run versioned images. Defaults to :latest.
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
      args:
        AGENTSHROUD_VERSION: ${AGENTSHROUD_VERSION:-latest}
    # Host entries for personal lab — override via AGENTSHROUD_EXTRA_HOSTS env var or docker-compose.override.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "marvin:192.168.7.137"
      - "trillian:192.168.7.97"
      - "raspberrypi:192.168.7.25"
    image: agentshroud-gateway:${AGENTSHROUD_VERSION:-latest}
    container_name: agentshroud-gateway
    hostname: gateway
    restart: unless-stopped
    stop_grace_period: "15s"
    ports:
      - 127.0.0.1:8080:8080
    volumes:
      - ../agentshroud.yaml:/app/agentshroud.yaml:ro
      - agentshroud-ssh:/var/agentshroud-ssh:ro
      - gateway-data:/app/data
      - ../web:/app/web:ro
      - ../gateway:/app/gateway:ro
      - agentshroud-workspace:/data/bot-workspace:ro
      - agentshroud-config:/data/bot-config:ro
      - security-reports:/var/log/security
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - wazuh-alerts:/var/ossec/logs/alerts
      - clamav-db:/var/lib/clamav
    secrets:
      - gateway_password
      - telegram_bot_token
      - slack_bot_token
      - slack_signing_secret
      - slack_app_token
      - anthropic_oauth_token
      - openai_api_key
      - google_api_key
      - 1password_bot_email
      - 1password_bot_master_password
      - 1password_bot_secret_key
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - AGENTSHROUD_EGRESS_APPROVAL_ALL=false
      - GATEWAY_AUTH_TOKEN_FILE=/run/secrets/gateway_password
      - OP_SERVICE_ACCOUNT_TOKEN_FILE=/run/secrets/1password_service_account
      - PROXY_ALLOWED_NETWORKS=10.254.110.0/24,10.254.111.0/24,10.254.112.0/24
      - AGENTSHROUD_SLACK_OWNER_USER_ID=${AGENTSHROUD_SLACK_OWNER_USER_ID:-}
      - AGENTSHROUD_CONTROL_UI_ORIGINS=${AGENTSHROUD_CONTROL_UI_ORIGINS:-http://localhost:18789,https://localhost:18789}
      - AGENTSHROUD_COLLAB_LOCAL_INFO_ONLY=0
      - AGENTSHROUD_TEAMS_JSON=${AGENTSHROUD_TEAMS_JSON:-}
      - AGENTSHROUD_MODEL_MODE=${AGENTSHROUD_MODEL_MODE:-cloud}
      - AGENTSHROUD_CLOUD_MODEL_REF=${AGENTSHROUD_CLOUD_MODEL_REF:-anthropic/claude-opus-4-6}
      - AGENTSHROUD_LOCAL_MODEL_REF=${AGENTSHROUD_LOCAL_MODEL_REF:-ollama/qwen3:14b}
      - OPENCLAW_MAIN_MODEL=${OPENCLAW_MAIN_MODEL:-}
      - LMSTUDIO_API_BASE=${LMSTUDIO_API_BASE:-}
      - MLXLM_API_BASE=${MLXLM_API_BASE:-http://host.docker.internal:8234}
      - AGENTSHROUD_ANCHOR_MODEL=${AGENTSHROUD_ANCHOR_MODEL:-qwen3.5:27b}
      - AGENTSHROUD_CODING_MODEL=${AGENTSHROUD_CODING_MODEL:-qwen2.5-coder:32b}
      - AGENTSHROUD_REASONING_MODEL=${AGENTSHROUD_REASONING_MODEL:-deepseek-r1}
      - DOCKER_CONTENT_TRUST=1
      # Image digest refs for cosign supply-chain verification. Set to
      # repo@sha256:<digest> at deploy time. Left empty disables verification.
      - AGENTSHROUD_BOT_IMAGE_REF=${AGENTSHROUD_BOT_IMAGE_REF:-}
      - AGENTSHROUD_GATEWAY_IMAGE_REF=${AGENTSHROUD_GATEWAY_IMAGE_REF:-}
      - AGENTSHROUD_COMPOSE_HOST=marvin
      - AGENTSHROUD_COMPOSE_DIR=/Users/agentshroud-bot/Development/agentshroud
      - AGENTSHROUD_INSTANCE_LABEL=${AGENTSHROUD_INSTANCE_LABEL:-prod}
      - TRIVY_CACHE_DIR=/var/log/security/.trivy-cache
      # Group chat: bot @handle (without @) for at-mention-only filtering in groups
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-agentshroud_bot}
      # Group chat: set to Telegram group/supergroup chat ID to bind → group-project agent
      - AGENTSHROUD_GROUP_CHAT_ID=${AGENTSHROUD_GROUP_CHAT_ID:-}
    group_add:
      - "991"   # docker socket GID — read-only service introspection for SOC
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/gateway-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
      - PERFMON
    pid: host
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /var/tmp:noexec,nosuid,size=50m
      - /var/log/fluent-bit:noexec,nosuid,size=50m
      - /var/log/falco:noexec,nosuid,size=50m
      - /var/ossec/var:nosuid,size=10m,uid=1000,gid=1000
      - /var/ossec/queue:nosuid,size=50m,uid=1000,gid=1000
      - /var/ossec/tmp:noexec,nosuid,size=10m,uid=1000,gid=1000
      - /var/ossec/logs/ossec:noexec,nosuid,size=20m,uid=1000,gid=1000
    mem_limit: 2560m
    memswap_limit: 2560m
    cpus: 1.0
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/status').read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    # Gateway DNS — defaults to public resolvers. Override via AGENTSHROUD_DNS_PRIMARY/SECONDARY
    # in docker/.env for site-specific resolvers (e.g. Pi-hole, local router).
    dns:
      - ${AGENTSHROUD_DNS_PRIMARY:-1.1.1.1}
      - ${AGENTSHROUD_DNS_SECONDARY:-8.8.8.8}
      - 1.1.1.1
      - 8.8.8.8

    # Gateway on BOTH networks: internal (internet) + isolated (to bot)
    networks:
      - agentshroud-internal
      - agentshroud-isolated

  # ── Bot ──────────────────────────────────────────────────────────────────────
  # OpenClaw agent. Fully isolated — no direct internet, no host access.
  # All egress through gateway proxy. DNS: Docker internal only.
  bot:
    build:
      context: ..
      dockerfile: docker/bots/openclaw/Dockerfile
      args:
        AGENTSHROUD_VERSION: ${AGENTSHROUD_VERSION:-latest}
    # Host entries for personal lab — override via AGENTSHROUD_EXTRA_HOSTS env var or docker-compose.override.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "marvin:192.168.7.137"
      - "trillian:192.168.7.97"
      - "raspberrypi:192.168.7.25"
    image: agentshroud-bot:${AGENTSHROUD_VERSION:-latest}
    container_name: agentshroud-bot
    hostname: agentshroud
    restart: unless-stopped
    stop_grace_period: "15s"
    ports:
      - 127.0.0.1:18789:18789
    volumes:
      - agentshroud-config:/home/node/.agentshroud
      - agentshroud-workspace:/home/node/agentshroud/workspace
      - gateway-data:/home/node/agentshroud/gateway-data:ro
      - agentshroud-ssh:/home/node/.ssh
      - openclaw-runtime:/home/node/.npm-global
      - agentshroud-browsers:/home/node/.cache/ms-playwright
      - ../branding:/app/branding:ro
      - memory-backups:/app/memory-backups
      - wazuh-alerts:/var/ossec/logs/alerts
    secrets:
      - gateway_password
      - telegram_bot_token
      - slack_bot_token
      - slack_app_token
      - anthropic_oauth_token
      - openai_api_key
      - google_api_key
      - 1password_bot_email
      - 1password_bot_master_password
      - 1password_bot_secret_key
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-lan}
      - OP_SERVICE_ACCOUNT_TOKEN_FILE=/run/secrets/1password_service_account
      - OPENCLAW_GATEWAY_PASSWORD_FILE=/run/secrets/gateway_password
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
      - HTTP_PROXY=http://gateway:8181
      - HTTPS_PROXY=http://gateway:8181
      - NO_PROXY=gateway,localhost,127.0.0.1
      - NODE_OPTIONS=--require /app/config-defaults/openclaw/setup-https-proxy.js
      - GATEWAY_OP_PROXY_URL=http://gateway:8080
      - ANTHROPIC_BASE_URL=http://gateway:8080
      - OPENAI_BASE_URL=http://gateway:8080
      - GEMINI_BASE_URL=http://gateway:8080
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://gateway:8080/v1}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      - AGENTSHROUD_MODEL_MODE=${AGENTSHROUD_MODEL_MODE:-cloud}
      - AGENTSHROUD_LOCAL_MODEL_REF=${AGENTSHROUD_LOCAL_MODEL_REF:-ollama/qwen3:14b}
      - AGENTSHROUD_CLOUD_MODEL_REF=${AGENTSHROUD_CLOUD_MODEL_REF:-anthropic/claude-opus-4-6}
      - OPENCLAW_MAIN_MODEL=${OPENCLAW_MAIN_MODEL:-}
      - AGENTSHROUD_LOCAL_MODEL=${AGENTSHROUD_LOCAL_MODEL:-qwen3:14b}
      - LMSTUDIO_API_BASE=${LMSTUDIO_API_BASE:-}
      - AGENTSHROUD_ANCHOR_MODEL=${AGENTSHROUD_ANCHOR_MODEL:-qwen3.5:27b}
      - AGENTSHROUD_CODING_MODEL=${AGENTSHROUD_CODING_MODEL:-qwen2.5-coder:32b}
      - AGENTSHROUD_REASONING_MODEL=${AGENTSHROUD_REASONING_MODEL:-deepseek-r1}
      - AGENTSHROUD_TEAMS_JSON=${AGENTSHROUD_TEAMS_JSON:-}
      - TELEGRAM_API_BASE_URL=http://gateway:8080/telegram-api
      - SLACK_API_BASE_URL=http://gateway:8080/slack-api
      - AGENTSHROUD_SLACK_OWNER_USER_ID=${AGENTSHROUD_SLACK_OWNER_USER_ID:-}
      - AGENTSHROUD_CONTROL_UI_ORIGINS=${AGENTSHROUD_CONTROL_UI_ORIGINS:-http://localhost:18789,https://localhost:18789}
      - GATEWAY_HOST_PORT=8080
      - AGENTSHROUD_GROUP_CHAT_ID=${AGENTSHROUD_GROUP_CHAT_ID:-}
      - OPENCLAW_BOT_NAME=agentshroud_bot
      - OPENCLAW_BOT_EMAIL=${OPENCLAW_BOT_EMAIL:-bot@example.com}
      - OPENCLAW_DISABLE_HOST_FILESYSTEM=true
      - OPENCLAW_SANDBOX_MODE=strict
      - OPENCLAW_DISABLE_BONJOUR=1
      - AGENTSHROUD_INSTANCE_LABEL=${AGENTSHROUD_INSTANCE_LABEL:-prod}
      - NPM_CONFIG_PREFIX=/home/node/.npm-global
      - NPM_CONFIG_CACHE=/home/node/.npm-global/.cache
      - PATH=/home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp/agentshroud-seccomp.json
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /var/tmp:noexec,nosuid,size=100m
      - /home/node/.npm:noexec,nosuid,size=200m,uid=1000,gid=1000
      - /home/node/.local:noexec,nosuid,size=100m
      - /home/node/.config:noexec,nosuid,size=100m,uid=1000,gid=1000
      - /home/node/.ssh-tmp:nosuid,size=10m,uid=1000,gid=1000
      - /var/ossec/var:nosuid,size=10m,uid=1000,gid=1000
      - /var/ossec/queue:nosuid,size=50m,uid=1000,gid=1000
      - /var/ossec/tmp:noexec,nosuid,size=10m,uid=1000,gid=1000
      - /var/ossec/logs/ossec:noexec,nosuid,size=20m,uid=1000,gid=1000
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 2.0
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:18789/ -o /dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Bot DNS — defaults to public resolvers. Override via AGENTSHROUD_DNS_PRIMARY/SECONDARY
    # in docker/.env for site-specific resolvers (e.g. Pi-hole, local router).
    dns:
      - ${AGENTSHROUD_DNS_PRIMARY:-1.1.1.1}
      - ${AGENTSHROUD_DNS_SECONDARY:-8.8.8.8}
      - 1.1.1.1
      - 8.8.8.8
    # Bot on isolated network only — no direct internet access.
    # All outbound traffic must route through the gateway on agentshroud-isolated.
    networks:
      - agentshroud-isolated
    depends_on:
      gateway:
        condition: service_healthy


# ── Secrets ────────────────────────────────────────────────────────────────────
# `asb up/rebuild/clean-rebuild` extracts secrets from the credential backend
# (1Password/Keychain/secret-tool) into a tmpdir and overrides these file: paths
# at runtime — no persistent plaintext files on the host. The paths below are
# fallbacks for manual `docker compose` usage; run `./setup-secrets.sh extract`
# to populate them, or prefer `asb up` (recommended).
secrets:
  gateway_password:
    file: ./secrets/gateway_password.txt
  anthropic_oauth_token:
    file: ./secrets/anthropic_oauth_token.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  google_api_key:
    file: ./secrets/google_api_key.txt
  1password_bot_email:
    file: ./secrets/1password_bot_email.txt
  1password_bot_master_password:
    file: ./secrets/1password_bot_master_password.txt
  1password_bot_secret_key:
    file: ./secrets/1password_bot_secret_key.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token_production.txt
  slack_bot_token:
    file: ./secrets/slack_bot_token.txt
  slack_signing_secret:
    file: ./secrets/slack_signing_secret.txt
  slack_app_token:
    file: ./secrets/slack_app_token.txt

# ── Networks ───────────────────────────────────────────────────────────────────
# Two networks: internal (internet access) and isolated (no internet)
# Only the gateway is on both. Bot is isolated only.
networks:
  agentshroud-internal:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 10.254.110.0/24
  agentshroud-isolated:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.254.111.0/24
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  gateway-data:
    driver: local
  agentshroud-config:
    driver: local
  agentshroud-workspace:
    driver: local
  agentshroud-ssh:
    driver: local
  agentshroud-browsers:
    driver: local
  openclaw-runtime:
    name: openclaw-runtime
  security-reports:
    driver: local
  wazuh-alerts:
    driver: local
  clamav-db:
    driver: local
  memory-backups:
    driver: local
