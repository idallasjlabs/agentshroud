# One Claw Tied Behind Your Back - Self-Contained Secure Deployment
# All data in current directory - NO host dependencies

services:
  oneclaw:
    # Build from secure Dockerfile
    build:
      context: ..
      dockerfile: Dockerfile.secure
      args:
        OPENCLAW_VERSION: main

    image: oneclaw-secure:latest
    container_name: oneclaw_isaiah
    hostname: isaiahs-assistant

    # Network isolation - internet only
    networks:
      - oneclaw_isolated
    dns:
      - 1.1.1.1
      - 8.8.8.8

    # Port exposure (localhost only)
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"

    # Maximum security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # read_only: true  # Temporarily disabled for debugging
    user: "1000:1000"

    # Prevent host filesystem access
    ipc: private
    pid: ""

    # Temporary directories (required for read-only root)
    tmpfs:
      - /tmp:noexec,nosuid,size=512M
      - /var/tmp:noexec,nosuid,size=256M
      - /app/.cache:noexec,nosuid,size=256M
      - /app/.local:noexec,nosuid,size=128M
      - /app/.openclaw:noexec,nosuid,size=256M

    # Environment variables from file
    env_file:
      - ./secrets/.env
    environment:
      - NODE_ENV=production
      - HOME=/app
      - ONECLAW_WORKSPACE=/app/workspace

      # Disable telemetry and external tracking
      - TELEMETRY_DISABLED=1
      - DO_NOT_TRACK=1
      - DISABLE_TELEMETRY=1

    # Volume mounts (read workspace persona files)
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs

    # Resource limits (prevent DoS)
    mem_limit: 4g
    mem_reservation: 2g
    cpus: 2
    pids_limit: 1024

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging (prevent disk exhaustion)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oneclaw_isolated:
    driver: bridge
    internal: false  # Allow internet
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
    driver_opts:
      com.docker.network.bridge.name: oneclaw_iso
      com.docker.network.bridge.enable_icc: "false"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.default_bridge: "false"
