name: Bug Report
description: Report a defect in AgentShroud
title: "[Bug]: "
labels:
  - bug
assignees:
  - idallasj

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug in AgentShroud™. Please fill out the fields below with as much detail as possible to help us reproduce and resolve the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal, reproducible sequence of steps.
      placeholder: |
        1. Start gateway with `docker-compose -f docker-compose.secure.yml up`
        2. Send a request to ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The request should have been blocked by EgressFilter with a 403 response.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
      placeholder: The request passed through without inspection.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentShroud Version
      description: Run `python -c "import gateway; print(gateway.__version__)"` or check `gateway/__init__.py`.
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running AgentShroud?
      options:
        - macOS
        - Linux
        - Docker
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant gateway, container, or security module logs. Redact secrets and PII before submitting.
      placeholder: Paste log output here (optional).
      render: shell
    validations:
      required: false
