name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Gateway Image
        run: docker build -t agentshroud-gateway:scan -f gateway/Dockerfile .

      - name: Run Trivy on Gateway Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agentshroud-gateway:scan
          format: sarif
          output: trivy-gateway.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF (Gateway)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-gateway.sarif
          category: trivy-gateway

      - name: Build Bot Image
        run: docker build -t agentshroud-bot:scan -f docker/bots/openclaw/Dockerfile .

      - name: Run Trivy on Bot Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agentshroud-bot:scan
          format: sarif
          output: trivy-openclaw.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF (OpenClaw)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-openclaw.sarif
          category: trivy-openclaw

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: pip install -r gateway/requirements.txt

      - name: Run pip-audit
        run: pip-audit --format=json --output=pip-audit.json || true

      - name: Check for critical vulnerabilities
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('pip-audit.json'))
          vulns = data.get('dependencies', [])
          critical = [v for v in vulns if v.get('vulns')]
          if critical:
              print(f'Found {len(critical)} vulnerable packages')
              for pkg in critical:
                  print(f\"  {pkg['name']} {pkg['version']}: {len(pkg['vulns'])} vulns\")
              sys.exit(1)
          print('No vulnerabilities found')
          "
