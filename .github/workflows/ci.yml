name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gateway/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest gateway/tests/ -v \
            --cov=gateway \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Security audit
        run: |
          pip install -r gateway/requirements.txt
          pip-audit --desc on --fix --dry-run

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks (commits after v1.0.4 redaction)
        # Scan only commits after c628add (the v1.0.4 secret-redaction commit).
        # Pre-remediation history is intentionally excluded — all secrets were
        # replaced with clearly-fake values in that commit.
        # Note: --no-git (filesystem scan) is intentionally omitted here because
        # the test suite contains legitimate fake-but-detectable credential strings
        # used to verify the detection system itself; those are covered by the
        # paths allowlist in .gitleaks.toml.
        run: gitleaks detect --source . --log-opts="c628add..HEAD" --redact

  smoke-static:
    name: Startup Smoke Tests (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run startup smoke tests
        run: node tests/startup_smoke/test_apply_patches.js

  soul-freshness:
    name: SOUL.md Freshness Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check soul-updated date is within 90 days
        run: |
          set -e
          SOUL_FILES=(
            "docker/config/openclaw/workspace/SOUL.md"
            "docker/bots/openclaw/workspace/collaborator-workspace/SOUL.md"
          )
          STALE=0
          TODAY=$(date -u +%Y-%m-%d)
          MAX_AGE_DAYS=90

          for file in "${SOUL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: $file not found" >&2
              exit 1
            fi

            DATE_LINE=$(grep -o 'soul-updated: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' "$file" | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' || true)

            if [ -z "$DATE_LINE" ]; then
              echo "FAIL: $file is missing <!-- soul-updated: YYYY-MM-DD --> marker" >&2
              STALE=1
              continue
            fi

            # Days between soul-updated date and today
            SOUL_EPOCH=$(date -u -d "$DATE_LINE" +%s 2>/dev/null || date -u -j -f "%Y-%m-%d" "$DATE_LINE" +%s)
            TODAY_EPOCH=$(date -u -d "$TODAY" +%s 2>/dev/null || date -u +%s)
            AGE_DAYS=$(( (TODAY_EPOCH - SOUL_EPOCH) / 86400 ))

            if [ "$AGE_DAYS" -gt "$MAX_AGE_DAYS" ]; then
              echo "FAIL: $file soul-updated is $DATE_LINE ($AGE_DAYS days ago — exceeds ${MAX_AGE_DAYS}-day limit)" >&2
              echo "      Update the Current Focus / Long-Term Goals sections and bump soul-updated." >&2
              STALE=1
            else
              echo "OK:   $file soul-updated $DATE_LINE ($AGE_DAYS days ago)"
            fi
          done

          exit $STALE

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black isort flake8

      - name: Check formatting
        run: |
          black --check --line-length 100 gateway/
          isort --check --profile black --line-length 100 gateway/

      - name: Lint
        run: flake8 gateway/ --max-line-length 100 --extend-ignore=E501,E203,E226,E228,E231,E304,E402,E712,E741,W291,W293,W503,F401,F541,F811,F821,F824,F841
