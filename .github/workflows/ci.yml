name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gateway/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt
          pip install pytest-cov
          pip install pytest-xdist

      - name: Run tests with coverage
        run: |
          python -m pytest gateway/tests/ -v \
            --cov=gateway \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=94

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Security audit
        run: |
          pip install -r gateway/requirements.txt
          pip-audit --desc on --fix --dry-run

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks (commits after v1.0.4 redaction)
        # Scan only commits after c628add (the v1.0.4 secret-redaction commit).
        # Pre-remediation history is intentionally excluded — all secrets were
        # replaced with clearly-fake values in that commit.
        # Note: --no-git (filesystem scan) is intentionally omitted here because
        # the test suite contains legitimate fake-but-detectable credential strings
        # used to verify the detection system itself; those are covered by the
        # paths allowlist in .gitleaks.toml.
        run: gitleaks detect --source . --log-opts="c628add..HEAD" --redact

  smoke-static:
    name: Startup Smoke Tests (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run startup smoke tests
        run: node tests/startup_smoke/test_apply_patches.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black isort flake8

      - name: Check formatting
        run: |
          black --check --line-length 100 gateway/
          isort --check --profile black --line-length 100 gateway/

      - name: Lint
        run: flake8 gateway/ --max-line-length 100 --extend-ignore=E501,E203,E226,E228,E231,E304,E402,E712,E741,W291,W293,W503,F401,F541,F811,F821,F824,F841

  benchmark:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt
          pip install pytest-benchmark
      - name: Run benchmark regression
        run: |
          python -m pytest gateway/tests/test_benchmark_regression.py -v \
            --benchmark-json=.benchmarks/current.json || true
          python scripts/check_benchmark_regression.py

  dast:
    name: DAST Scan (Nuclei)
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Start gateway
        run: |
          docker compose -f docker/docker-compose.yml up -d gateway
          sleep 10
      - name: Install nuclei
        run: |
          curl -sSfL https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei_linux_amd64.zip \
            -o nuclei.zip && unzip nuclei.zip -d /usr/local/bin/
      - name: Run nuclei scan
        run: |
          nuclei -u http://localhost:8080 -severity medium,high,critical \
            -sarif-export dast-results.sarif || true
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-sarif
          path: dast-results.sarif
      - name: Stop gateway
        if: always()
        run: docker compose -f docker/docker-compose.yml down

  docs-drift:
    name: Docs Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check version consistency
        run: |
          PKG_VERSION=$(python -c "import sys; sys.path.insert(0,''); from gateway import __version__; print(__version__)")
          API_VERSION=$(grep -o 'version="[^"]*"' gateway/ingest_api/main.py | grep -o '[0-9][^"]*' || echo "dynamic")
          echo "Package version: $PKG_VERSION"
          echo "API version declaration: $API_VERSION"
          if [ "$API_VERSION" != "dynamic" ] && [ "$API_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: API version '$API_VERSION' does not match package version '$PKG_VERSION'"
            echo "Fix: use version=__version__ in gateway/ingest_api/main.py"
            exit 1
          fi
          echo "Version consistency: OK"
