name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gateway/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt
          pip install pytest-cov

      - name: Run tests
        run: pytest gateway/tests/ -q --tb=short

  docker-build-push:
    name: Docker Build & Tag
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build gateway image
        run: |
          docker build \
            -f gateway/Dockerfile \
            -t agentshroud-gateway:${{ steps.version.outputs.version }} \
            -t agentshroud-gateway:latest \
            .

      - name: Build bot image
        run: |
          docker build \
            -f docker/bots/openclaw/Dockerfile \
            -t agentshroud-bot:${{ steps.version.outputs.version }} \
            -t agentshroud-bot:latest \
            .

      # Push to registry is commented out — no registry configured yet.
      # Uncomment and configure REGISTRY, IMAGE_NAME, and login step when ready.
      # - name: Push gateway image
      #   run: |
      #     docker push agentshroud-gateway:${{ steps.version.outputs.version }}
      #     docker push agentshroud-gateway:latest
      # - name: Push bot image
      #   run: |
      #     docker push agentshroud-bot:${{ steps.version.outputs.version }}
      #     docker push agentshroud-bot:latest

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG notes for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Grab lines between "## [VERSION]" header and the next "## [" header.
          # sed: start printing after the matching version header; stop at the next ## [ line.
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d; /^## \[/d; p}" CHANGELOG.md)
          # Strip leading/trailing blank lines and export as multiline output.
          NOTES=$(echo "${NOTES}" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "${NOTES}" ]; then
            NOTES="Release ${VERSION}. See CHANGELOG.md for details."
          fi
          # Write to a temp file to avoid quoting issues with gh release create.
          echo "${NOTES}" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "AgentShroud™ ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md
