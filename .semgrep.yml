# AgentShroud Semgrep SAST Configuration
# Copyright © 2026 Isaiah Dallas Jefferson, Jr. AgentShroud™. All rights reserved.
#
# IEC 62443 4-1 SDL alignment — automated security testing in SDLC.
# Runs as a pre-commit hook and in CI on every PR.
#
# Usage:
#   semgrep scan --config .semgrep.yml gateway/
#   semgrep scan --config .semgrep.yml gateway/ --error  # exit 1 on findings

rules:
  # ---------------------------------------------------------------------------
  # Subprocess safety — command injection risk
  # Directly relevant: key_rotation.py shells out to `op` CLI with user-controlled args
  # ---------------------------------------------------------------------------

  - id: agentshroud-subprocess-shell-true
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
    message: |
      subprocess called with shell=True. This enables shell injection if any
      argument is user-controlled. Use a list of arguments and shell=False instead.
      Relevant file: key_rotation.py uses subprocess.run with op CLI args.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-78
      owasp: "A03:2021 - Injection"
      iec_62443: "FR3 SR 3.3"

  - id: agentshroud-subprocess-unvalidated-input
    patterns:
      - pattern: subprocess.$FUNC([$CMD, ..., $ARG, ...], ...)
      - pattern-not: subprocess.$FUNC([$CMD, ...], ...)
    message: |
      subprocess called with arguments that may include user-controlled values.
      Ensure all arguments are validated before passing to subprocess.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-78
      iec_62443: "FR3 SR 3.3"

  # ---------------------------------------------------------------------------
  # Path traversal — file sandbox bypass risk
  # Relevant: file_sandbox.py, path_isolation.py
  # ---------------------------------------------------------------------------

  - id: agentshroud-path-traversal-open
    patterns:
      - pattern: open($PATH, ...)
      - pattern-not: open("/...", ...)
      - pattern-not: |
          $SAFE_PATH = ...
          ...
          open($SAFE_PATH, ...)
    message: |
      open() called with a potentially user-controlled path. Validate and
      normalize paths before opening to prevent path traversal (CWE-22).
      Use pathlib.Path.resolve() and confirm the result is within allowed directories.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-22
      owasp: "A01:2021 - Broken Access Control"
      iec_62443: "FR2 SR 2.1"

  # ---------------------------------------------------------------------------
  # Hardcoded secrets — must not appear in source
  # ---------------------------------------------------------------------------

  - id: agentshroud-hardcoded-password
    patterns:
      - pattern: $VAR = "$PASSWORD"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|secret|token|key|credential|passwd|pwd)
      - metavariable-regex:
          metavariable: $PASSWORD
          regex: .{8,}
    message: |
      Possible hardcoded secret in variable '$VAR'. Use environment variables
      or Docker secrets instead. Never commit credentials to source.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: "A07:2021 - Identification and Authentication Failures"
      iec_62443: "FR1 SR 1.5"

  # ---------------------------------------------------------------------------
  # SSRF / unvalidated URL construction
  # Relevant: egress_filter.py bypass attempts via SSRF
  # ---------------------------------------------------------------------------

  - id: agentshroud-ssrf-httpx
    patterns:
      - pattern: httpx.$METHOD($URL, ...)
      - pattern-not: httpx.$METHOD("https://...", ...)
      - pattern-not: httpx.$METHOD("http://...", ...)
    message: |
      httpx request with a potentially dynamic URL. Ensure the URL is validated
      against the egress allowlist before making the request (SSRF risk).
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-918
      owasp: "A10:2021 - Server-Side Request Forgery"
      iec_62443: "FR5 SR 5.1"

  - id: agentshroud-ssrf-requests
    patterns:
      - pattern: requests.$METHOD($URL, ...)
    message: |
      requests library call with potentially user-controlled URL. Validate
      against egress allowlist to prevent SSRF.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-918
      iec_62443: "FR5 SR 5.1"

  # ---------------------------------------------------------------------------
  # Insecure deserialization
  # ---------------------------------------------------------------------------

  - id: agentshroud-pickle-load
    patterns:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
    message: |
      pickle.load/loads is unsafe with untrusted data. Use json.loads() or
      a validated schema (Pydantic) for deserialization.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-502
      owasp: "A08:2021 - Software and Data Integrity Failures"

  # ---------------------------------------------------------------------------
  # assert used for security validation — stripped by Python -O
  # ---------------------------------------------------------------------------

  - id: agentshroud-assert-security-check
    patterns:
      - pattern: assert $EXPR, $MSG
      - pattern-not: assert $EXPR  # no message = test context
    message: |
      assert statements are removed when Python runs with -O optimization.
      Never use assert for security checks. Use explicit if/raise instead.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-617
      iec_62443: "FR3 SR 3.3"

  # ---------------------------------------------------------------------------
  # SQL injection — parameterized queries required
  # ---------------------------------------------------------------------------

  - id: agentshroud-sql-injection
    patterns:
      - pattern: |
          $CURSOR.execute($QUERY % ...)
      - pattern: |
          $CURSOR.execute($QUERY.format(...))
      - pattern: |
          $CURSOR.execute(f"...")
    message: |
      SQL query constructed with string formatting — SQL injection risk.
      Use parameterized queries: cursor.execute(query, (param,))
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 - Injection"

  # ---------------------------------------------------------------------------
  # Logging sensitive data
  # ---------------------------------------------------------------------------

  - id: agentshroud-log-sensitive-key
    patterns:
      - pattern: $LOGGER.$LEVEL(..., $SECRET, ...)
      - metavariable-regex:
          metavariable: $SECRET
          regex: (?i)(token|password|secret|key|credential)
    message: |
      Potentially logging sensitive data. Ensure tokens, passwords, and keys
      are redacted before logging.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-532
      iec_62443: "FR4 SR 4.1"
